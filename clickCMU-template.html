<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>__UP_CLICK_CMU_TITLE__</title>
    <style>
      :root {
        --bg: #f2f9eb;
        --panel: #ffffff;
        --ink: #1f2229;
        --muted: #346d0c;
        --line: rgba(64, 129, 17, 0.24);
        --accent: #408111;
        --accent-ink: #346d0c;
        --warn: #a8431f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Adobe Clean", "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #fbfdf4 0%, var(--bg) 100%);
        color: var(--ink);
      }

      .app {
        max-width: 1200px;
        margin: 0 auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .head {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: var(--panel);
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        flex-wrap: wrap;
      }

      h1 {
        margin: 0;
        font-size: 18px;
        line-height: 1.2;
      }

      .meta {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      button,
      a.link-btn {
        appearance: none;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 7px 12px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
      }

      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      button.primary:hover:not(:disabled) {
        background: var(--accent-ink);
        border-color: var(--accent-ink);
      }

      button.secondary,
      a.link-btn {
        background: #fff;
        color: var(--accent-ink);
      }

      button.secondary:hover:not(:disabled),
      a.link-btn:hover {
        border-color: var(--accent);
      }

      button:disabled {
        opacity: 0.65;
        cursor: default;
      }

      .status {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
      }

      .status.error {
        color: var(--warn);
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 10px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--panel);
        overflow: hidden;
      }

      .card-head {
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .card-title {
        margin: 0;
        font-size: 13px;
        font-weight: 700;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 48px;
        height: 20px;
        padding: 0 8px;
        border-radius: 999px;
        border: 1px solid var(--line);
        font-size: 11px;
        font-weight: 700;
      }

      .badge.ok {
        color: #3f5f1a;
        background: rgba(64, 129, 17, 0.16);
        border-color: rgba(82, 161, 25, 0.34);
      }

      .badge.err {
        color: #8e2f12;
        background: rgba(198, 83, 39, 0.14);
        border-color: rgba(198, 83, 39, 0.3);
      }

      .card-meta {
        margin: 0;
        font-size: 11px;
        color: var(--muted);
      }

      .card-body {
        padding: 10px 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .url {
        margin: 0;
        font-size: 11px;
        color: var(--muted);
      }

      .card-url-context {
        display: grid;
        gap: 4px;
        width: 100%;
      }

      .card-url-path {
        min-width: 0;
        display: inline-flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 4px;
      }

      .card-url-path-segment {
        max-width: 100%;
        color: var(--accent-ink);
        font-size: 10.8px;
        font-weight: 560;
        white-space: nowrap;
      }

      .card-url-path-link {
        text-decoration: none;
        color: inherit;
        cursor: pointer;
      }

      .card-url-path-link:hover {
        color: var(--accent);
        text-decoration: none;
      }

      .card-url-path-link:focus-visible {
        outline: none;
        box-shadow: 0 0 0 2px var(--line);
        border-radius: 3px;
      }

      .card-url-path-segment-terminal {
        font-weight: 700;
        color: var(--ink);
      }

      .card-url-path-segment-empty {
        color: var(--muted);
        font-weight: 520;
      }

      .card-url-path-divider {
        color: var(--muted);
        font-size: 10px;
        font-weight: 600;
      }

      .card-url-query-cloud {
        min-width: 0;
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 4px 9px;
      }

      .card-url-query-chip {
        display: inline-block;
        max-width: 100%;
        color: var(--muted);
        font-size: 10.2px;
        font-weight: 560;
        font-variant-numeric: tabular-nums;
        white-space: nowrap;
      }

      .card-url-query-key {
        font-weight: 700;
        color: var(--accent-ink);
      }

      .card-url-query-eq {
        margin: 0;
        color: var(--muted);
      }

      .card-url-query-value {
        display: inline-block;
        max-width: 184px;
        margin-left: 0;
        color: var(--ink);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        vertical-align: bottom;
      }

      .card-url-query-empty,
      .card-url-empty {
        color: var(--muted);
        font-style: italic;
      }

      .error-box {
        margin: 0;
        font-size: 11px;
        color: var(--warn);
        white-space: pre-wrap;
      }

      .table-wrap {
        border: 1px solid var(--line);
        border-radius: 8px;
        overflow: auto;
        max-height: 280px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 6px 8px;
        text-align: left;
        font-size: 11px;
        border-bottom: 1px solid var(--line);
        vertical-align: top;
      }

      th {
        position: sticky;
        top: 0;
        background: #eff8e7;
        z-index: 1;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121b09;
          --panel: #1a2710;
          --ink: #e6f5d8;
          --muted: #a8c88b;
          --line: rgba(100, 190, 35, 0.3);
          --accent: #4e9a17;
          --accent-ink: #64be23;
          --warn: #ffbb9d;
        }

        body {
          background: linear-gradient(180deg, #18240d 0%, var(--bg) 100%);
        }

        button.secondary,
        a.link-btn {
          background: #2e381c;
          color: var(--ink);
        }

        .badge.ok {
          color: #edf5d8;
          background: rgba(78, 154, 23, 0.24);
          border-color: rgba(100, 190, 35, 0.42);
        }

        .badge.err {
          color: #ffd6c7;
          background: rgba(198, 83, 39, 0.22);
          border-color: rgba(198, 83, 39, 0.42);
        }

        th {
          background: #243516;
        }
      }

      .empty {
        margin: 0;
        font-size: 11px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="head">
        <div class="title-row">
          <h1 id="title">CMU CLICK</h1>
          <p id="token-meta" class="meta"></p>
        </div>
        <div class="actions">
          <button id="run-all" class="primary" type="button">Run All CMU Calls</button>
          <button id="refresh-token" class="secondary" type="button">Refresh IMS Token</button>
          <a
            class="link-btn"
            href="https://experience.adobe.com/#/@adobepass/cm-console/cmu/year/tenant"
            target="_blank"
            rel="noopener noreferrer"
            >Sign In to Adobe Pass Console</a
          >
        </div>
        <p id="status" class="status">Initializing clickCMU...</p>
      </header>
      <section id="cards" class="cards"></section>
    </main>

    <input id="cmu-programmer-id" type="hidden" value="__UP_CLICK_CMU_PROGRAMMER_ID__" />
    <input id="cmu-seed-token" type="hidden" value="__UP_CLICK_CMU_ACCESS_TOKEN__" />
    <input id="cmu-client-ids-json" type="hidden" value="__UP_CLICK_CMU_CLIENT_IDS_JSON__" />
    <input id="cmu-user-id" type="hidden" value="__UP_CLICK_CMU_USER_ID__" />
    <input id="cmu-scope" type="hidden" value="__UP_CLICK_CMU_SCOPE__" />
    <input id="cmu-endpoints-json" type="hidden" value="__UP_CLICK_CMU_ENDPOINTS_JSON__" />

    <script>
      (() => {
        "use strict";
        window.__UNDERPAR_CLICK_CMU_RUNTIME__ = true;
        const CM_REPORTS_BASE_URL = "https://cm-reports.adobeprimetime.com";
        const IMS_VALIDATE_TOKEN_URL = "https://ims-na1.adobelogin.com/ims/validate_token/v1?jslVersion=underpar-clickcmu";
        const IMS_CHECK_TOKEN_URL = "https://adobeid-na1.services.adobe.com/ims/check/v6/token";
        const CMU_CLIENT_ID = "cm-console-ui";
        const CMU_CONSOLE_ORIGIN = "https://experience.adobe.com";
        const CMU_CONSOLE_REFERER = `${CMU_CONSOLE_ORIGIN}/`;
        const CMU_REPORTS_ORIGIN = "https://cdn.experience.adobe.net";
        const CMU_REPORTS_REFERER = `${CMU_REPORTS_ORIGIN}/`;
        const DEFAULT_SCOPE = "AdobeID,openid,dma_group_mapping,read_organizations,additional_info.projectedProductContext";
        const TOKEN_FRESH_SKEW_MS = 45 * 1000;
        const REQUEST_TIMEOUT_MS = 45 * 1000;
        const TENANT_QUERY_KEYS = ["tenant", "tenant_id", "tenant-id"];

        const els = {
          title: document.getElementById("title"),
          tokenMeta: document.getElementById("token-meta"),
          status: document.getElementById("status"),
          runAll: document.getElementById("run-all"),
          refreshToken: document.getElementById("refresh-token"),
          cards: document.getElementById("cards"),
          programmerId: document.getElementById("cmu-programmer-id"),
          seedToken: document.getElementById("cmu-seed-token"),
          clientIdsJson: document.getElementById("cmu-client-ids-json"),
          userId: document.getElementById("cmu-user-id"),
          scope: document.getElementById("cmu-scope"),
          endpointsJson: document.getElementById("cmu-endpoints-json"),
        };

        const state = {
          running: false,
          accessToken: "",
          clientIds: [],
          userId: "",
          scope: "",
          endpoints: [],
          lastRefreshSource: "seed",
          lastRefreshAt: 0,
        };

        function setStatus(message, type = "info") {
          const text = String(message || "").trim();
          els.status.textContent = text;
          els.status.classList.toggle("error", type === "error");
        }

        function readEncodedInput(elementId) {
          const node = document.getElementById(elementId);
          if (!node) {
            return "";
          }
          const raw = String(node.value || "").trim();
          if (!raw) {
            return "";
          }
          try {
            return decodeURIComponent(raw);
          } catch {
            return raw;
          }
        }

        function safeJsonParse(value, fallback = null) {
          const text = String(value || "").trim();
          if (!text) {
            return fallback;
          }
          try {
            return JSON.parse(text);
          } catch {
            return fallback;
          }
        }

        function normalizeToken(value) {
          return String(value || "")
            .trim()
            .replace(/^Bearer\s+/i, "")
            .trim();
        }

        function resolveTenantScope() {
          return String(els.programmerId?.value || "").trim();
        }

        function canonicalizeUsagePath(pathValue) {
          const raw = String(pathValue || "").trim();
          if (!raw) {
            return "";
          }
          let pathname = raw;
          try {
            pathname = String(new URL(raw, CM_REPORTS_BASE_URL).pathname || "");
          } catch {
            pathname = String(raw || "").split("?")[0];
          }
          const parts = pathname
            .split("/")
            .map((value) => String(value || "").trim().toLowerCase())
            .filter(Boolean)
            .filter((value) => value !== "cmu" && value !== "v2");
          if (parts.length === 0 || !parts.includes("year")) {
            return "";
          }
          const rootParts = ["year", "tenant"];
          const rootSet = new Set(rootParts);
          const extras = [];
          const seen = new Set();
          parts.forEach((part) => {
            if (rootSet.has(part) || seen.has(part)) {
              return;
            }
            seen.add(part);
            extras.push(part);
          });
          return `/${["v2", ...rootParts, ...extras].join("/")}`;
        }

        function isUsagePath(pathValue) {
          return canonicalizeUsagePath(pathValue).startsWith("/v2/year/tenant");
        }

        function stripServerManagedTimeParams(urlValue) {
          const raw = String(urlValue || "").trim();
          if (!raw) {
            return "";
          }
          try {
            const parsed = new URL(raw, CM_REPORTS_BASE_URL);
            parsed.searchParams.delete("start");
            parsed.searchParams.delete("end");
            return parsed.toString();
          } catch {
            return raw;
          }
        }

        function normalizeUsageZoomValue(value = "") {
          const normalized = String(value || "")
            .trim()
            .toUpperCase()
            .replace(/[^A-Z]/g, "");
          if (!normalized) {
            return "";
          }
          if (normalized === "YR" || normalized === "YEAR" || normalized === "YEARLY") {
            return "YR";
          }
          if (normalized === "MO" || normalized === "MON" || normalized === "MONTH" || normalized === "MONTHLY") {
            return "MO";
          }
          if (normalized === "DAY" || normalized === "DAILY" || normalized === "D") {
            return "DAY";
          }
          if (normalized === "HR" || normalized === "HOUR" || normalized === "HOURLY" || normalized === "H") {
            return "HR";
          }
          if (normalized === "MIN" || normalized === "MINUTE" || normalized === "MINUTELY" || normalized === "M") {
            return "MIN";
          }
          return "";
        }

        function getUsageZoomKey(pathValue = "", fallbackUrl = "") {
          const rawUrl = String(fallbackUrl || pathValue || "").trim();
          if (rawUrl) {
            try {
              const parsed = new URL(rawUrl, CM_REPORTS_BASE_URL);
              const queryZoom = normalizeUsageZoomValue(
                firstNonEmptyString([
                  parsed.searchParams.get("zm"),
                  parsed.searchParams.get("zoom"),
                  parsed.searchParams.get("zoomLevel"),
                  parsed.searchParams.get("zoom_level"),
                  parsed.searchParams.get("zoom-level"),
                ])
              );
              if (queryZoom) {
                return queryZoom;
              }
            } catch {
              const queryMatch = rawUrl.match(/[?&](?:zm|zoom(?:[_-]?level)?)=([^&#]+)/i);
              if (queryMatch?.[1]) {
                try {
                  const decodedZoom = normalizeUsageZoomValue(decodeURIComponent(queryMatch[1]));
                  if (decodedZoom) {
                    return decodedZoom;
                  }
                } catch {
                  const rawZoom = normalizeUsageZoomValue(queryMatch[1]);
                  if (rawZoom) {
                    return rawZoom;
                  }
                }
              }
            }
          }

          const haystack = `${String(pathValue || "").toLowerCase()} ${String(fallbackUrl || "").toLowerCase()}`;
          if (haystack.includes("/minute")) {
            return "MIN";
          }
          if (haystack.includes("/hour")) {
            return "HR";
          }
          if (haystack.includes("/day")) {
            return "DAY";
          }
          if (haystack.includes("/month")) {
            return "MO";
          }
          if (haystack.includes("/year")) {
            return "YR";
          }
          return "";
        }

        function applyTenantScopeToSearchParams(searchParams, tenantScope = "") {
          if (!(searchParams instanceof URLSearchParams)) {
            return;
          }
          TENANT_QUERY_KEYS.forEach((key) => searchParams.delete(key));
          const normalizedTenantScope = String(tenantScope || "").trim();
          if (normalizedTenantScope) {
            searchParams.set("tenant", normalizedTenantScope);
          }
        }

        function applyTenantScopeToUrl(urlValue) {
          const raw = String(urlValue || "").trim();
          if (!raw) {
            return "";
          }
          const tenantScope = resolveTenantScope();
          if (!tenantScope) {
            return raw;
          }
          try {
            const parsed = new URL(raw, CM_REPORTS_BASE_URL);
            if (!isUsagePath(parsed.pathname)) {
              return parsed.toString();
            }
            applyTenantScopeToSearchParams(parsed.searchParams, tenantScope);
            return parsed.toString();
          } catch {
            return raw;
          }
        }

        function parseJwtPayload(token) {
          const normalized = normalizeToken(token);
          const parts = normalized.split(".");
          if (parts.length < 2) {
            return null;
          }
          try {
            const payloadBase64 = parts[1].replace(/-/g, "+").replace(/_/g, "/");
            const padded = payloadBase64 + "=".repeat((4 - (payloadBase64.length % 4 || 4)) % 4);
            return JSON.parse(atob(padded));
          } catch {
            return null;
          }
        }

        function tokenExpiryMs(token) {
          const payload = parseJwtPayload(token) || {};
          const exp = Number(payload.exp || 0);
          if (!Number.isFinite(exp) || exp <= 0) {
            return 0;
          }
          return exp * 1000;
        }

        function isTokenFresh(token, skewMs = 0) {
          const normalized = normalizeToken(token);
          if (!normalized) {
            return false;
          }
          const expMs = tokenExpiryMs(normalized);
          if (!expMs) {
            return true;
          }
          return expMs > Date.now() + Math.max(0, Number(skewMs) || 0);
        }

        function tokenizeScopeSet(scope) {
          return String(scope || "")
            .split(/[\s,]+/g)
            .map((part) => String(part || "").trim())
            .filter(Boolean);
        }

        function tokenSupportsCmCatalog(token) {
          const normalized = normalizeToken(token);
          if (!normalized) {
            return false;
          }
          const claims = parseJwtPayload(normalized) || {};
          if (!claims || typeof claims !== "object") {
            return false;
          }
          const clientId = String(claims.client_id || claims.clientId || "").trim().toLowerCase();
          return clientId === CMU_CLIENT_ID;
        }

        function collectRuntimeUserIdCandidates() {
          const tokenClaims = parseJwtPayload(state.accessToken) || {};
          const orderedCandidates = [state.userId, tokenClaims.user_id, tokenClaims.userId];
          const output = [];
          const seen = new Set();
          orderedCandidates.forEach((value) => {
            const normalized = String(value || "").trim();
            if (!normalized) {
              return;
            }
            const key = normalized.toLowerCase();
            if (seen.has(key)) {
              return;
            }
            seen.add(key);
            output.push(normalized);
          });
          return output;
        }

        function uniqueStrings(values) {
          const output = [];
          const seen = new Set();
          (Array.isArray(values) ? values : []).forEach((value) => {
            const text = String(value || "").trim();
            if (!text) {
              return;
            }
            const key = text.toLowerCase();
            if (seen.has(key)) {
              return;
            }
            seen.add(key);
            output.push(text);
          });
          return output;
        }

        function hasHeaderName(headersLike, headerName) {
          const normalizedHeaderName = String(headerName || "").trim().toLowerCase();
          if (!normalizedHeaderName || !headersLike || typeof headersLike !== "object") {
            return false;
          }
          return Object.keys(headersLike).some((key) => String(key || "").trim().toLowerCase() === normalizedHeaderName);
        }

        function isCmuReportsUrl(urlValue = "") {
          const raw = String(urlValue || "").trim();
          if (!raw) {
            return false;
          }
          try {
            const parsed = new URL(raw);
            return String(parsed.hostname || "").trim().toLowerCase() === "cm-reports.adobeprimetime.com";
          } catch {
            return false;
          }
        }

        function withCmuReportHeaders(headersLike = {}, endpointUrl = "") {
          const nextHeaders = headersLike && typeof headersLike === "object" ? { ...headersLike } : {};
          if (!isCmuReportsUrl(endpointUrl)) {
            return nextHeaders;
          }
          if (!hasHeaderName(nextHeaders, "Origin")) {
            nextHeaders.Origin = CMU_REPORTS_ORIGIN;
          }
          if (!hasHeaderName(nextHeaders, "Referer")) {
            nextHeaders.Referer = CMU_REPORTS_REFERER;
          }
          return nextHeaders;
        }

        function extractTokenFromPayload(payload) {
          if (!payload || typeof payload !== "object") {
            return "";
          }
          const nestedToken =
            payload.token && typeof payload.token === "object"
              ? payload.token.access_token || payload.token.accessToken || payload.token.token || payload.token.value || ""
              : payload.token || "";
          return normalizeToken(
            payload.access_token ||
              payload.accessToken ||
              nestedToken ||
              payload.authorization ||
              payload.Authorization ||
              payload.bearer ||
              payload.imsToken ||
              ""
          );
        }

        async function fetchWithTimeout(url, init = {}, timeoutMs = REQUEST_TIMEOUT_MS) {
          const controller = new AbortController();
          const timerId = window.setTimeout(() => controller.abort(), Math.max(2000, Number(timeoutMs) || REQUEST_TIMEOUT_MS));
          try {
            return await fetch(url, {
              ...init,
              signal: controller.signal,
            });
          } finally {
            window.clearTimeout(timerId);
          }
        }

        function buildValidateTokenBody(token, clientId) {
          const form = new URLSearchParams({
            type: "access_token",
            token: normalizeToken(token),
          });
          if (clientId) {
            form.set("client_id", String(clientId).trim());
          }
          return form.toString();
        }

        async function refreshTokenViaValidateToken(forceFresh = false) {
          const seedToken = normalizeToken(state.accessToken);
          if (!seedToken) {
            return null;
          }
          const candidateClientIds = uniqueStrings([...state.clientIds, CMU_CLIENT_ID]).filter(
            (clientId) => String(clientId || "").trim().toLowerCase() === CMU_CLIENT_ID
          );
          for (const clientId of candidateClientIds) {
            const body = buildValidateTokenBody(seedToken, clientId);
            const response = await fetchWithTimeout(IMS_VALIDATE_TOKEN_URL, {
              method: "POST",
              credentials: "include",
              headers: {
                Accept: "*/*",
                Origin: CMU_CONSOLE_ORIGIN,
                Referer: CMU_CONSOLE_REFERER,
                "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8",
                ...(clientId ? { client_id: clientId } : {}),
              },
              body,
            }).catch(() => null);
            if (!response || !response.ok) {
              continue;
            }
            const rawText = await response.text().catch(() => "");
            const parsed = safeJsonParse(rawText, null);
            if (!parsed || typeof parsed !== "object") {
              continue;
            }
            const refreshed = extractTokenFromPayload(parsed);
            if (refreshed && tokenSupportsCmCatalog(refreshed) && (!forceFresh || isTokenFresh(refreshed, TOKEN_FRESH_SKEW_MS))) {
              return { token: refreshed, source: `validate:${clientId}` };
            }
            if (parsed.valid === true && !forceFresh && tokenSupportsCmCatalog(seedToken)) {
              return { token: seedToken, source: `validate-existing:${clientId}` };
            }
          }
          return null;
        }

        function buildImsCheckUrl(clientId, scope, userId) {
          const url = new URL(IMS_CHECK_TOKEN_URL);
          if (clientId) {
            url.searchParams.set("client_id", clientId);
          }
          if (scope) {
            url.searchParams.set("scope", scope);
          }
          if (userId) {
            url.searchParams.set("user_id", userId);
          }
          return url.toString();
        }

        async function refreshTokenViaImsCheck(forceFresh = false) {
          const userIdCandidates = [];
          collectRuntimeUserIdCandidates().forEach((candidate) => {
            if (!userIdCandidates.includes(candidate)) {
              userIdCandidates.push(candidate);
            }
          });
          if (!userIdCandidates.includes("")) {
            userIdCandidates.push("");
          }
          const candidateClientIds = uniqueStrings([...state.clientIds, CMU_CLIENT_ID]).filter(
            (clientId) => String(clientId || "").trim().toLowerCase() === CMU_CLIENT_ID
          );
          const scopeCandidates = uniqueStrings([state.scope, DEFAULT_SCOPE].flatMap((value) => tokenizeScopeSet(value).join(",")));
          for (const clientId of candidateClientIds) {
            for (const scope of scopeCandidates.length > 0 ? scopeCandidates : [DEFAULT_SCOPE]) {
              for (const userIdCandidate of userIdCandidates) {
                const requestUrl = buildImsCheckUrl(clientId, scope, userIdCandidate);
                for (const credentials of ["include", "omit"]) {
                  const response = await fetchWithTimeout(requestUrl, {
                    method: "POST",
                    credentials,
                    headers: {
                      Accept: "*/*",
                      Origin: CMU_CONSOLE_ORIGIN,
                      Referer: CMU_CONSOLE_REFERER,
                    },
                  }).catch(() => null);
                  if (!response || !response.ok) {
                    continue;
                  }
                  const rawText = await response.text().catch(() => "");
                  const parsed = safeJsonParse(rawText, null);
                  if (!parsed || typeof parsed !== "object") {
                    continue;
                  }
                  const refreshed = extractTokenFromPayload(parsed);
                  if (!refreshed || !tokenSupportsCmCatalog(refreshed)) {
                    continue;
                  }
                  if (forceFresh && !isTokenFresh(refreshed, TOKEN_FRESH_SKEW_MS)) {
                    continue;
                  }
                  return { token: refreshed, source: `check:${clientId}:${credentials}` };
                }
              }
            }
          }
          return null;
        }

        async function ensureAccessToken(forceRefresh = false) {
          if (!forceRefresh && isTokenFresh(state.accessToken, TOKEN_FRESH_SKEW_MS) && tokenSupportsCmCatalog(state.accessToken)) {
            return state.accessToken;
          }
          let refreshResult = null;
          try {
            refreshResult = await refreshTokenViaValidateToken(forceRefresh);
          } catch {
            refreshResult = null;
          }
          if (!refreshResult) {
            try {
              refreshResult = await refreshTokenViaImsCheck(forceRefresh);
            } catch {
              refreshResult = null;
            }
          }
          if (refreshResult?.token) {
            state.accessToken = normalizeToken(refreshResult.token);
            state.lastRefreshSource = String(refreshResult.source || "refresh");
            state.lastRefreshAt = Date.now();
            updateTokenMeta();
            return state.accessToken;
          }
          if (!forceRefresh && tokenSupportsCmCatalog(state.accessToken)) {
            return state.accessToken;
          }
          return "";
        }

        function normalizeEndpointUrl(url) {
          const text = String(url || "").trim();
          if (!text) {
            return "";
          }
          try {
            const parsed = new URL(stripServerManagedTimeParams(text), CM_REPORTS_BASE_URL);
            const canonicalPath = canonicalizeUsagePath(parsed.pathname);
            if (canonicalPath) {
              parsed.pathname = canonicalPath;
            }
            parsed.searchParams.delete("start");
            parsed.searchParams.delete("end");
            if (!parsed.searchParams.has("format")) {
              parsed.searchParams.set("format", "json");
            }
            if (isUsagePath(parsed.pathname)) {
              if (!parsed.searchParams.has("metrics")) {
                const lowerPath = String(parsed.pathname || "").toLowerCase();
                if (lowerPath.includes("/tenant") || lowerPath.includes("/hour")) {
                  parsed.searchParams.set("metrics", "users");
                }
              }
            }
            return applyTenantScopeToUrl(parsed.toString());
          } catch {
            return applyTenantScopeToUrl(text);
          }
        }

        function normalizeEndpoints(value) {
          const raw = Array.isArray(value) ? value : [];
          const output = [];
          const seen = new Set();
          raw.forEach((entry, index) => {
            const id = String(entry?.id || `cmu-${index + 1}`).trim() || `cmu-${index + 1}`;
            const label = String(entry?.label || "CMU Endpoint").trim() || "CMU Endpoint";
            const url = normalizeEndpointUrl(entry?.url);
            if (!url || seen.has(url)) {
              return;
            }
            seen.add(url);
            output.push({ id, label, url });
          });
          return output;
        }

        function responseLooksLikeAuthFailure(status, parsed, text) {
          if (Number(status || 0) !== 401 && Number(status || 0) !== 403) {
            return false;
          }
          const errorText = String(
            (parsed && typeof parsed === "object" && (parsed?.error?.message || parsed?.error || parsed?.message)) || text || ""
          )
            .trim()
            .toLowerCase();
          return (
            errorText.includes("token") ||
            errorText.includes("invalid_sso_info") ||
            errorText.includes("session cookie is null") ||
            errorText.includes("login")
          );
        }

        async function fetchEndpointPayload(endpoint, forceRefreshToken = false) {
          const token = await ensureAccessToken(forceRefreshToken);
          if (!token || !tokenSupportsCmCatalog(token)) {
            throw new Error(
              "UnderPAR could not auto-hydrate a cm-console-ui bearer from the current Adobe IMS session. Sign in again and retry."
            );
          }
          const requestHeaders = withCmuReportHeaders(
            {
              Accept: "*/*",
              ...(token ? { Authorization: `Bearer ${token}` } : {}),
            },
            endpoint.url
          );
          const response = await fetchWithTimeout(endpoint.url, {
            method: "GET",
            credentials: "include",
            headers: requestHeaders,
          });
          const text = await response.text().catch(() => "");
          const parsed = safeJsonParse(text, null);
          if (
            !forceRefreshToken &&
            responseLooksLikeAuthFailure(response.status, parsed, text)
          ) {
            const retriedToken = await ensureAccessToken(true);
            if (retriedToken) {
              return fetchEndpointPayload(endpoint, true);
            }
            throw new Error(
              "UnderPAR could not auto-hydrate a cm-console-ui bearer from the current Adobe IMS session. Sign in again and retry."
            );
          }
          if (!response.ok) {
            const detailText = String(
              (parsed && typeof parsed === "object" && (parsed?.error?.message || parsed?.error || parsed?.message)) || text || response.statusText
            ).trim();
            throw new Error(`HTTP ${response.status || 0}: ${detailText || "request failed"}`);
          }
          return {
            status: Number(response.status || 0),
            payload: parsed != null ? parsed : text,
            fetchedAt: Date.now(),
          };
        }

        function normalizeRows(payload) {
          if (Array.isArray(payload)) {
            return payload;
          }
          if (!payload || typeof payload !== "object") {
            return [];
          }
          if (Array.isArray(payload.items)) {
            return payload.items;
          }
          if (Array.isArray(payload.results)) {
            return payload.results;
          }
          if (Array.isArray(payload.data)) {
            return payload.data;
          }
          return [payload];
        }

        function collectColumns(rows) {
          const output = [];
          const seen = new Set();
          (Array.isArray(rows) ? rows : []).slice(0, 60).forEach((row) => {
            if (!row || typeof row !== "object") {
              return;
            }
            Object.keys(row).forEach((key) => {
              const text = String(key || "").trim();
              if (!text) {
                return;
              }
              const normalized = text.toLowerCase();
              if (normalized === "v2" || seen.has(normalized)) {
                return;
              }
              seen.add(normalized);
              output.push(text);
            });
          });
          return output;
        }

        function formatCellValue(value) {
          if (value == null) {
            return "";
          }
          if (typeof value === "string" || typeof value === "number" || typeof value === "boolean") {
            return String(value);
          }
          try {
            return JSON.stringify(value);
          } catch {
            return String(value);
          }
        }

        function escapeHtml(value) {
          return String(value || "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
        }

        function safeDecodeUrlSegment(value) {
          const text = String(value || "");
          try {
            return decodeURIComponent(text);
          } catch {
            return text;
          }
        }

        function isLikelyRequestUrl(value) {
          const raw = String(value || "").trim();
          if (!raw) {
            return false;
          }
          if (/^https?:\/\//i.test(raw)) {
            return true;
          }
          if (raw.startsWith("/")) {
            return true;
          }
          return /^[a-z0-9._~-]+\/[^\s]+$/i.test(raw);
        }

        function parseRawQueryPairs(urlValue) {
          const raw = String(urlValue || "").trim();
          if (!isLikelyRequestUrl(raw)) {
            return [];
          }
          const queryIndex = raw.indexOf("?");
          if (queryIndex < 0) {
            return [];
          }
          const hashIndex = raw.indexOf("#", queryIndex + 1);
          const queryText = raw.slice(queryIndex + 1, hashIndex >= 0 ? hashIndex : undefined).trim();
          if (!queryText) {
            return [];
          }
          return queryText
            .split("&")
            .map((entry) => String(entry || "").trim())
            .filter(Boolean)
            .map((entry) => {
              const equalsIndex = entry.indexOf("=");
              if (equalsIndex < 0) {
                return {
                  key: safeDecodeUrlSegment(entry.replace(/\+/g, " ")),
                  value: "",
                  hasValue: false,
                };
              }
              const key = safeDecodeUrlSegment(entry.slice(0, equalsIndex).replace(/\+/g, " "));
              const value = entry.slice(equalsIndex + 1);
              return {
                key,
                value,
                hasValue: true,
              };
            });
        }

        function parseRequestContext(urlValue) {
          const raw = String(urlValue || "").trim();
          if (!isLikelyRequestUrl(raw)) {
            return {
              fullUrl: "",
              pathSegments: [],
              queryPairs: [],
            };
          }

          let fullUrl = raw;
          let pathSegments = [];
          try {
            const parsed = new URL(raw, CM_REPORTS_BASE_URL);
            fullUrl = parsed.toString();
            pathSegments = String(parsed.pathname || "")
              .split("/")
              .map((segment) => safeDecodeUrlSegment(segment.trim()))
              .filter(Boolean);
          } catch {
            pathSegments = String(raw.split(/[?#]/, 1)[0] || "")
              .split("/")
              .map((segment) => safeDecodeUrlSegment(segment.trim()))
              .filter(Boolean);
          }

          return {
            fullUrl,
            pathSegments,
            queryPairs: parseRawQueryPairs(fullUrl),
          };
        }

        function buildPathEndpointUrl(baseEndpointUrl, pathSegments, depth) {
          const normalizedDepth = Number(depth);
          if (!Number.isInteger(normalizedDepth) || normalizedDepth < 1) {
            return "";
          }
          const normalizedSegments = (Array.isArray(pathSegments) ? pathSegments : [])
            .map((segment) => String(segment || "").trim())
            .filter(Boolean)
            .slice(0, normalizedDepth);
          if (normalizedSegments.length === 0) {
            return "";
          }

          const targetPath = normalizedSegments.join("/");
          const fallback = `${CM_REPORTS_BASE_URL}/${targetPath}`;
          const rawBase = String(baseEndpointUrl || "").trim();
          if (!rawBase) {
            return fallback;
          }
          try {
            const parsed = new URL(rawBase, CM_REPORTS_BASE_URL);
            parsed.pathname = `/${targetPath}`;
            parsed.search = "";
            parsed.hash = "";
            return parsed.toString();
          } catch {
            return fallback;
          }
        }

        function buildInheritedRequestUrl(endpointUrl, sourceRequestUrl) {
          const endpointRaw = String(endpointUrl || "").trim();
          if (!endpointRaw) {
            return "";
          }

          try {
            const endpointParsed = new URL(endpointRaw, CM_REPORTS_BASE_URL);
            endpointParsed.search = "";
            endpointParsed.hash = "";

            const sourceRaw = String(sourceRequestUrl || "").trim();
            if (!sourceRaw) {
              return applyTenantScopeToUrl(endpointParsed.toString());
            }
            const sourceParsed = new URL(stripServerManagedTimeParams(sourceRaw), CM_REPORTS_BASE_URL);
            sourceParsed.searchParams.forEach((value, key) => {
              if (key === "start" || key === "end") {
                return;
              }
              endpointParsed.searchParams.append(key, value);
            });
            return applyTenantScopeToUrl(endpointParsed.toString());
          } catch {
            return applyTenantScopeToUrl(stripServerManagedTimeParams(endpointRaw));
          }
        }

        function getEndpointKey(urlValue) {
          const raw = String(urlValue || "").trim();
          if (!raw) {
            return "";
          }
          try {
            const parsed = new URL(raw, CM_REPORTS_BASE_URL);
            return `${parsed.origin}${parsed.pathname.replace(/\/+$/, "")}`.toLowerCase();
          } catch {
            return raw.split(/[?#]/, 1)[0].replace(/\/+$/, "").toLowerCase();
          }
        }

        function getEndpointLabel(urlValue) {
          const context = parseRequestContext(urlValue);
          if (context.pathSegments.length > 0) {
            return context.pathSegments[context.pathSegments.length - 1];
          }
          return "CMU Endpoint";
        }

        function buildUrlContextMarkup(urlValue, endpointUrl = "") {
          const context = parseRequestContext(urlValue);

          const pathMarkup =
            context.pathSegments.length > 0
              ? context.pathSegments
                  .map((segment, index) => {
                    const segmentClass = `card-url-path-segment${index === context.pathSegments.length - 1 ? " card-url-path-segment-terminal" : ""}`;
                    const segmentEndpointUrl = buildPathEndpointUrl(endpointUrl || context.fullUrl, context.pathSegments, index + 1);
                    const segmentText = escapeHtml(segment);
                    const segmentMarkup = segmentEndpointUrl
                      ? `<a class="${segmentClass} card-url-path-link" href="${escapeHtml(segmentEndpointUrl)}" data-endpoint-url="${escapeHtml(
                          segmentEndpointUrl
                        )}" data-source-request-url="${escapeHtml(context.fullUrl)}">${segmentText}</a>`
                      : `<span class="${segmentClass}">${segmentText}</span>`;
                    return `${segmentMarkup}${index < context.pathSegments.length - 1 ? '<span class="card-url-path-divider">/</span>' : ""}`;
                  })
                  .join("")
              : '<span class="card-url-path-segment card-url-path-segment-empty">cm</span>';

          const queryMarkup =
            context.queryPairs.length > 0
              ? context.queryPairs
                  .map((pair) => {
                    const keyHtml = `<span class="card-url-query-key">${escapeHtml(pair.key)}</span>`;
                    if (!pair.hasValue) {
                      return `<span class="card-url-query-chip">${keyHtml}</span>`;
                    }
                    return `<span class="card-url-query-chip">${keyHtml}<span class="card-url-query-eq">=</span><span class="card-url-query-value">${escapeHtml(
                      pair.value
                    )}</span></span>`;
                  })
                  .join("")
              : '<span class="card-url-query-empty">no-query</span>';

          return `
            <span class="card-url-context" aria-label="CMU request context">
              <span class="card-url-path" aria-label="CMU path">${pathMarkup}</span>
              <span class="card-url-query-cloud" aria-label="CMU query context">${queryMarkup}</span>
            </span>
          `;
        }

        function normalizeEndpointRecord(endpoint) {
          const normalizedUrl = normalizeEndpointUrl(endpoint?.url);
          const label = String(endpoint?.label || "").trim() || getEndpointLabel(normalizedUrl);
          const id = String(endpoint?.id || "").trim() || `cmu-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
          return {
            id,
            label,
            url: normalizedUrl,
          };
        }

        function bindCardEndpoint(card, endpoint) {
          const normalizedEndpoint = normalizeEndpointRecord(endpoint);
          card.dataset.endpointId = normalizedEndpoint.id;
          card.dataset.endpointUrl = normalizedEndpoint.url;
          card.__underparEndpoint = normalizedEndpoint;
          card.querySelector(".card-title").textContent = normalizedEndpoint.label;
          const urlElement = card.querySelector(".url");
          urlElement.innerHTML = buildUrlContextMarkup(normalizedEndpoint.url, normalizedEndpoint.url);
          urlElement.title = normalizedEndpoint.url;
          return normalizedEndpoint;
        }

        function setCardLoadingState(card) {
          const badge = card.querySelector(".badge");
          const meta = card.querySelector(".card-meta");
          const tableWrap = card.querySelector(".table-wrap");
          const empty = card.querySelector(".empty");
          const error = card.querySelector(".error-box");
          badge.textContent = "RUN";
          badge.className = "badge";
          meta.textContent = "Running request...";
          tableWrap.hidden = true;
          empty.hidden = true;
          error.hidden = true;
        }

        async function handleCardPathNodeClick(card, endpointUrl, sourceRequestUrl) {
          if (state.running) {
            return;
          }
          const targetEndpointUrl = normalizeEndpointUrl(endpointUrl);
          if (!targetEndpointUrl) {
            return;
          }
          const inheritedRequestUrl = buildInheritedRequestUrl(targetEndpointUrl, sourceRequestUrl || card?.dataset?.endpointUrl || "");
          const currentEndpointUrl = normalizeEndpointUrl(card?.dataset?.endpointUrl || "");
          const targetEndpointKey = getEndpointKey(targetEndpointUrl);
          const currentEndpointKey = getEndpointKey(currentEndpointUrl);

          if (targetEndpointKey && currentEndpointKey && targetEndpointKey === currentEndpointKey) {
            const cardEndpoint = card?.__underparEndpoint || normalizeEndpointRecord({ url: currentEndpointUrl, label: getEndpointLabel(currentEndpointUrl) });
            await runEndpoint(
              {
                ...cardEndpoint,
                url: inheritedRequestUrl || targetEndpointUrl,
              },
              { card }
            );
            return;
          }

          const nextEndpoint = normalizeEndpointRecord({
            id: `path-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`,
            label: getEndpointLabel(targetEndpointUrl),
            url: inheritedRequestUrl || targetEndpointUrl,
          });
          await runEndpoint(nextEndpoint);
        }

        function createCard(endpoint) {
          const card = document.createElement("article");
          card.className = "card";
          card.innerHTML = `
            <div class="card-head">
              <p class="card-title"></p>
              <span class="badge">RUN</span>
            </div>
            <div class="card-body">
              <p class="card-meta"></p>
              <p class="url"></p>
              <div class="table-wrap" hidden>
                <table>
                  <thead></thead>
                  <tbody></tbody>
                </table>
              </div>
              <p class="empty" hidden></p>
              <p class="error-box" hidden></p>
            </div>
          `;
          card.addEventListener("click", (event) => {
            const link = event.target?.closest?.(".card-url-path-link[data-endpoint-url]");
            if (!link || !card.contains(link)) {
              return;
            }
            event.preventDefault();
            event.stopPropagation();
            void handleCardPathNodeClick(
              card,
              String(link.getAttribute("data-endpoint-url") || ""),
              String(link.getAttribute("data-source-request-url") || "")
            );
          });
          bindCardEndpoint(card, endpoint);
          els.cards.appendChild(card);
          return card;
        }

        function renderCardResult(card, result, endpoint) {
          const badge = card.querySelector(".badge");
          const meta = card.querySelector(".card-meta");
          const tableWrap = card.querySelector(".table-wrap");
          const thead = card.querySelector("thead");
          const tbody = card.querySelector("tbody");
          const empty = card.querySelector(".empty");
          const error = card.querySelector(".error-box");
          bindCardEndpoint(card, endpoint);
          badge.textContent = `OK ${result.status}`;
          badge.className = "badge ok";
          meta.textContent = `Fetched: ${new Date(result.fetchedAt).toLocaleString()}`;
          error.hidden = true;
          const rows = normalizeRows(result.payload);
          if (rows.length === 0) {
            tableWrap.hidden = true;
            empty.hidden = false;
            empty.textContent = "No rows returned.";
            return;
          }
          const columns = collectColumns(rows);
          if (columns.length === 0) {
            tableWrap.hidden = true;
            empty.hidden = false;
            empty.textContent = "JSON payload returned (no tabular columns detected).";
            return;
          }
          empty.hidden = true;
          tableWrap.hidden = false;
          thead.innerHTML = `<tr>${columns.map((column) => `<th>${escapeHtml(column)}</th>`).join("")}</tr>`;
          tbody.innerHTML = rows
            .slice(0, 250)
            .map((row) => {
              const cells = columns.map((column) => `<td>${escapeHtml(formatCellValue(row?.[column]))}</td>`).join("");
              return `<tr>${cells}</tr>`;
            })
            .join("");
        }

        function renderCardError(card, errorText, endpoint) {
          const badge = card.querySelector(".badge");
          const meta = card.querySelector(".card-meta");
          const tableWrap = card.querySelector(".table-wrap");
          const empty = card.querySelector(".empty");
          const error = card.querySelector(".error-box");
          bindCardEndpoint(card, endpoint);
          badge.textContent = "ERR";
          badge.className = "badge err";
          meta.textContent = `Failed: ${new Date().toLocaleString()}`;
          tableWrap.hidden = true;
          empty.hidden = true;
          error.hidden = false;
          error.textContent = String(errorText || "Request failed.");
        }

        async function runEndpoint(endpoint, options = {}) {
          const normalizedEndpoint = normalizeEndpointRecord(endpoint);
          if (!normalizedEndpoint.url) {
            return { ok: false, error: "CMU endpoint URL is missing." };
          }
          const card = options?.card || createCard(normalizedEndpoint);
          bindCardEndpoint(card, normalizedEndpoint);
          setCardLoadingState(card);
          try {
            const result = await fetchEndpointPayload(normalizedEndpoint, false);
            renderCardResult(card, result, normalizedEndpoint);
            return { ok: true };
          } catch (error) {
            const message = error instanceof Error ? error.message : String(error);
            renderCardError(card, message, normalizedEndpoint);
            return { ok: false, error: message };
          }
        }

        function updateTokenMeta() {
          const token = normalizeToken(state.accessToken);
          const expMs = tokenExpiryMs(token);
          const expLabel = expMs ? new Date(expMs).toLocaleString() : "unknown";
          const source = String(state.lastRefreshSource || "seed");
          const refreshedAt = state.lastRefreshAt ? new Date(state.lastRefreshAt).toLocaleTimeString() : "n/a";
          const clientLabel = state.clientIds.length > 0 ? state.clientIds.join(", ") : "cm-console-ui";
          const userLabel = state.userId || "unknown";
          const scopeLabel = state.scope || DEFAULT_SCOPE;
          els.tokenMeta.textContent = `token exp=${expLabel} | source=${source} @ ${refreshedAt} | clientId=${clientLabel} | userId=${userLabel} | scope=${scopeLabel}`;
        }

        async function runAllEndpoints() {
          if (state.running) {
            return;
          }
          if (state.endpoints.length === 0) {
            setStatus("No CMU endpoints are configured in this clickCMU export.", "error");
            return;
          }
          state.running = true;
          els.runAll.disabled = true;
          els.refreshToken.disabled = true;
          els.cards.innerHTML = "";
          setStatus(`Running ${state.endpoints.length} CMU endpoint${state.endpoints.length === 1 ? "" : "s"}...`);
          let okCount = 0;
          for (const endpoint of state.endpoints) {
            const result = await runEndpoint(endpoint);
            if (result.ok) {
              okCount += 1;
            }
          }
          state.running = false;
          els.runAll.disabled = false;
          els.refreshToken.disabled = false;
          if (okCount === state.endpoints.length) {
            setStatus(`Completed ${okCount}/${state.endpoints.length} CMU endpoint(s).`);
          } else {
            setStatus(
              `Completed ${okCount}/${state.endpoints.length} CMU endpoint(s). Open Adobe Pass Console login if auth failed.`,
              "error"
            );
          }
        }

        async function handleForceRefreshToken() {
          if (state.running) {
            return;
          }
          els.refreshToken.disabled = true;
          try {
            const refreshed = await ensureAccessToken(true);
            if (refreshed) {
              setStatus("IMS token refresh succeeded.");
            } else {
              setStatus("Unable to refresh IMS token. Sign in to Adobe Pass Console and retry.", "error");
            }
          } catch (error) {
            setStatus(
              `IMS token refresh failed: ${error instanceof Error ? error.message : String(error)}`,
              "error"
            );
          } finally {
            els.refreshToken.disabled = false;
          }
        }

        function loadStateFromTemplate() {
          const rawProgrammerId = readEncodedInput("cmu-programmer-id");
          const rawSeedToken = readEncodedInput("cmu-seed-token");
          const rawClientIds = safeJsonParse(readEncodedInput("cmu-client-ids-json"), []);
          const rawUserId = readEncodedInput("cmu-user-id");
          const rawScope = readEncodedInput("cmu-scope");
          const rawEndpoints = safeJsonParse(readEncodedInput("cmu-endpoints-json"), []);
          state.accessToken = normalizeToken(rawSeedToken);
          state.clientIds = uniqueStrings(rawClientIds).filter(
            (clientId) => String(clientId || "").trim().toLowerCase() === CMU_CLIENT_ID
          );
          state.userId = String(rawUserId || "").trim();
          state.scope = String(rawScope || DEFAULT_SCOPE).trim() || DEFAULT_SCOPE;
          state.endpoints = normalizeEndpoints(rawEndpoints);
          if (state.endpoints.length === 0) {
            state.endpoints = normalizeEndpoints([
              {
                id: "cmu-year-month",
                label: "CMU Tenant Summary",
                url: `${CM_REPORTS_BASE_URL}/v2/year/tenant?format=json`,
              },
            ]);
          }
          const titleText = document.title || "CLICK CMU";
          els.title.textContent = titleText;
          if (rawProgrammerId) {
            els.title.textContent = `${titleText} | ${rawProgrammerId}`;
          }
          updateTokenMeta();
        }

        async function init() {
          loadStateFromTemplate();
          els.runAll.addEventListener("click", () => {
            void runAllEndpoints();
          });
          els.refreshToken.addEventListener("click", () => {
            void handleForceRefreshToken();
          });
          if (!state.accessToken) {
            setStatus("No seed IMS token found. Sign in to Adobe Pass Console and regenerate clickCMU.", "error");
            return;
          }
          await runAllEndpoints();
        }

        void init();
      })();
    </script>
  </body>
</html>
