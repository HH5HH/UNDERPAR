      * {

      body {
        margin: 0;
        min-height: 100vh;
        background-color: var(--bg);

        color: var(--text-primary);
        font-family: adobe-clean, "Adobe Clean", "Source Sans Pro", "Segoe UI", system-ui, sans-serif;
        transition: background-color 180ms ease, color 180ms ease;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      .app-shell {
        width: min(1580px, 100%);
        margin: 0 auto;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .page-title {
        margin: 0 0 2px;
        font-size: 16px;
        font-weight: 800;
        letter-spacing: 0.012em;
      }

      .search-container {
        display: flex;
        align-items: center;
        flex-wrap: nowrap;
        gap: clamp(4px, 0.7vw, 12px);
        background:
          linear-gradient(180deg, color-mix(in srgb, var(--surface-frost) 95%, transparent) 0%, var(--panel) 100%),
          var(--panel);
        border: 1px solid color-mix(in srgb, var(--border) 78%, rgb(var(--zip-accent-900)) 22%);
        border-radius: var(--radius-panel);
        padding: clamp(6px, 0.8vw, 12px) clamp(8px, 1vw, 14px);
        box-shadow: var(--card-shadow);
        overflow: hidden;
        min-width: 0;
      }

      .search-left {
        display: flex;
        align-items: center;
        gap: clamp(3px, 0.6vw, 8px);
        flex-wrap: nowrap;
        margin: 0;
        flex: 1 1 auto;
        min-width: 0;
      }

      .search-right {
        margin-left: clamp(4px, 0.8vw, 12px);
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 0 0 auto;
      }

      .env-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        flex: 0 1 auto;
        width: fit-content;
        max-width: min(44vw, 420px);
        min-height: 24px;
        padding: 3px 8px 3px 6px;
        border: 1px solid color-mix(in srgb, var(--field-border) 70%, rgb(var(--zip-gray-500-rgb)) 30%);
        border-radius: 6px;
        background:
          linear-gradient(
            180deg,
            color-mix(in srgb, rgb(var(--zip-gray-25-rgb)) 30%, rgb(var(--zip-gray-100-rgb)) 70%) 0%,
            color-mix(in srgb, rgb(var(--zip-gray-75-rgb)) 78%, rgb(var(--zip-gray-200-rgb)) 22%) 52%,
            color-mix(in srgb, rgb(var(--zip-gray-100-rgb)) 62%, rgb(var(--zip-gray-300-rgb)) 38%) 100%
          );
        color: color-mix(in srgb, var(--text-primary) 76%, var(--text-muted) 24%);
        font-family: adobe-clean, "Adobe Clean", "Source Sans Pro", "Segoe UI", system-ui, sans-serif;
        font-size: 11px;
        line-height: 1.2;
        letter-spacing: 0.02em;
        user-select: text;
        opacity: 0.88;
        box-shadow:
          inset 0 1px 0 color-mix(in srgb, rgb(var(--zip-gray-25-rgb)) 38%, transparent),
          inset 0 -1px 0 color-mix(in srgb, rgb(var(--zip-gray-700-rgb)) 10%, transparent);
      }

      .env-badge-prefix {
        display: inline-flex;
        align-items: center;
        min-height: 18px;
        padding: 0 6px;
        flex: 0 0 auto;
        white-space: nowrap;
        border: 1px solid color-mix(in srgb, var(--field-border) 66%, rgb(var(--zip-gray-500-rgb)) 34%);
        border-radius: 4px;
        background:
          linear-gradient(
            180deg,
            color-mix(in srgb, rgb(var(--zip-gray-50-rgb)) 56%, rgb(var(--zip-gray-200-rgb)) 44%) 0%,
            color-mix(in srgb, rgb(var(--zip-gray-100-rgb)) 76%, rgb(var(--zip-gray-300-rgb)) 24%) 100%
          );
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: color-mix(in srgb, var(--text-muted) 80%, rgb(var(--zip-gray-800-rgb)) 20%);
      }

      .env-badge-sep {
        display: none;
      }

      .env-badge-value {
        flex: 0 1 auto;
        min-width: 0;
        color: color-mix(in srgb, var(--text-primary) 82%, var(--text-muted) 18%);
        font-family: adobe-clean, "Adobe Clean", "Source Sans Pro", "Segoe UI", system-ui, sans-serif;
        font-size: 11px;
        letter-spacing: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .env-badge:has(.env-badge-value:empty) {
        gap: 0;
        max-width: none;
        padding-right: 6px;
      }

      .env-badge:has(.env-badge-value:empty) .env-badge-value {
        display: none;
      }

      .toolbar-icon-btn,
      .theme-toggle {
        width: var(--control-height);
        height: var(--control-height);
        padding: 0;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 auto;
      }

      .toolbar-icon-btn {
        border: 1px solid var(--button-border);
        background: var(--button-bg);
        color: var(--button-text);
        cursor: pointer;
        transition: background-color 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
        box-shadow: 0 1px 0 color-mix(in srgb, var(--text-primary) 12%, transparent);
      }

      .toolbar-icon-btn:hover:not(:disabled) {
        border-color: color-mix(in srgb, var(--button-border) 70%, rgb(var(--zip-accent-900)) 30%);
        box-shadow: 0 3px 10px color-mix(in srgb, var(--shadow) 48%, transparent);
        background: var(--button-hover);
      }

      .toolbar-icon-btn:disabled {
        opacity: 0.62;
        cursor: default;
      }

      .toolbar-icon-btn.is-busy .toolbar-icon {
        animation: netSpin 0.8s linear infinite;
      }

      .toolbar-icon {
        width: 16px;
        height: 16px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .theme-toggle {
        border-radius: var(--radius-pill);
        border: 1.5px solid var(--theme-ring);
        background: var(--theme-preview);
        box-shadow: 0 0 0 3px var(--theme-halo), 0 3px 10px var(--theme-shadow);
        cursor: pointer;
        transition: border-color 120ms ease, box-shadow 120ms ease;
      }

      .theme-toggle:hover {
        transform: none;
        filter: none;
        border-color: var(--accent-strong);
      }

      .theme-toggle:active {
        transform: none;
      }

      .theme-toggle:focus-visible {
        outline: none;
        box-shadow: 0 0 0 3px var(--field-focus-ring);
      }

      #netIndicator {
        display: none;
        width: 14px;
        height: 14px;
