    <script>
      window.__UNDERPAR_CLICK_DGR_RUNTIME__ = true;

      const ADOBE_SP_BASE = "https://sp.auth.adobe.com";
      const DEGRADATION_API_BASE = "https://mgmt.auth.adobe.com/control/v3/degradation";
      const DEGRADATION_API_VERSION = "3.0";
      const THEME_STORAGE_KEY_PREFIX = "underpar-clickdgr-theme";
      const ACCESS_TOKEN_STORAGE_KEY_PREFIX = "underpar-clickdgr-access-token";

      const ENDPOINT_SPECS = [
        {
          key: "authnall",
          path: "authnAll",
          measureId: "authn-all",
          title: "Authenticate All - Status",
          targetType: "programmer",
          targetKey: "programmer",
        },
        {
          key: "authzall",
          path: "authzAll",
          measureId: "authz-all",
          title: "Authorize All - Status",
          targetType: "resource",
          targetKey: "resource",
        },
        {
          key: "authznone",
          path: "authzNone",
          measureId: "authz-none",
          title: "Authorize None - Status",
          targetType: "channel",
          targetKey: "channel",
        },
      ];

      const MEGA_ENDPOINT_SPEC = {
        key: "all",
        path: "all",
        measureId: "all-rules",
        title: "All Rules - Status",
        targetType: "aggregate",
        targetKey: "",
      };

      const DEFAULT_COLUMNS = [
        "Rule",
        "Measure ID",
        "Programmer",
        "MVPD",
        "Target Type",
        "Target",
        "Enabled",
        "Status",
        "Active",
        "TTL (s)",
        "Message",
        "Activation Time",
      ];

      const state = {
        busy: false,
        reports: [],
        mvpdCacheByRequestor: new Map(),
        reportSortByQueryKey: new Map(),
      };

      const els = {
        themeToggle: document.getElementById("themeToggle"),
        runnerForm: document.getElementById("runnerForm"),
        methodPicker: document.getElementById("methodPicker"),
        requestorPicker: document.getElementById("requestorPicker"),
        mvpdPicker: document.getElementById("mvpdPicker"),
        goButton: document.getElementById("goButton"),
        rerunAllButton: document.getElementById("rerunAllVisibleBtn"),
        netIndicator: document.getElementById("netIndicator"),
        statusLine: document.getElementById("statusLine"),
        resultsHost: document.getElementById("resultsHost"),
      };

      let rerunAllReportsInFlight = null;

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function firstNonEmptyString(values = []) {
        for (const value of Array.isArray(values) ? values : []) {
          const text = String(value ?? "").trim();
          if (text) {
            return text;
          }
        }
        return "";
      }

      function resolveAdobePassEnvironmentContext() {
        const spBase = String(ADOBE_SP_BASE || "https://sp.auth.adobe.com").trim() || "https://sp.auth.adobe.com";
        let mgmtBase = "";
        try {
          mgmtBase = String(new URL(DEGRADATION_API_BASE, window.location.href).origin || "").trim();
        } catch {
          mgmtBase = "";
        }
        if (!mgmtBase) {
          mgmtBase = spBase.replace("://sp.", "://mgmt.");
        }
        const isStaging =
          /staging/i.test(spBase) ||
          /staging/i.test(mgmtBase) ||
          /staging/i.test(String(DEGRADATION_API_BASE || ""));
        const route = isStaging ? "release-staging" : "release-production";
        const label = isStaging ? "Staging" : "Production";
        const consoleBase = isStaging ? "https://console.auth-staging.adobe.com" : "https://console.auth.adobe.com";
        const cmConsoleOrigin = isStaging ? "https://experience-stage.adobe.com" : "https://experience.adobe.com";
        return {
          key: route,
          label,
          route,
          consoleBase,
          cmConsoleOrigin,
          cmReportsBase: "https://cm-reports.adobeprimetime.com",
          mgmtBase,
          spBase,
          consoleShellUrl: `https://experience.adobe.com/#/@adobepass/pass/authentication/${route}`,
          cmConsoleShellUrl: `${cmConsoleOrigin}/#/@adobepass/cm-console/cmu/year`,
          dcrRegisterUrl: `${spBase}/o/client/register`,
          dcrTokenUrl: `${spBase}/o/client/token`,
          restV2Base: `${spBase}/api/v2`,
          esmBase: `${mgmtBase}/esm/v3/media-company/`,
          degradationBase: `${mgmtBase}/control/v3/degradation`,
        };
      }

      function buildEnvironmentBadgeMessage() {
        const environment = resolveAdobePassEnvironmentContext();
        return [`Environment : ${environment.label}`, `DEGRADATION : ${environment.degradationBase}`].join("\n");
      }

      function syncEnvironmentBadge() {
        const envDisplay = document.getElementById("envBaseDisplay");
        const envBadge = envDisplay?.closest(".env-badge");
        const environment = resolveAdobePassEnvironmentContext();
        const envMessage = buildEnvironmentBadgeMessage();
        const envBase = String(environment.degradationBase || environment.mgmtBase || "").trim();
        if (envDisplay) {
          envDisplay.textContent = "";
          envDisplay.title = envMessage;
          envDisplay.setAttribute("aria-hidden", "true");
          envDisplay.dataset.baseUrl = envBase;
        }
        if (envBadge) {
          envBadge.title = envMessage;
          envBadge.setAttribute("aria-label", envMessage);
          envBadge.dataset.baseUrl = envBase;
        }
      }

      function uniqueSorted(values = []) {
        const normalized = [];
        const seen = new Set();
        (Array.isArray(values) ? values : []).forEach((value) => {
          const text = String(value || "").trim();
          if (!text) {
            return;
          }
          const key = text.toLowerCase();
          if (seen.has(key)) {
            return;
          }
          seen.add(key);
          normalized.push(text);
        });
        return normalized.sort((left, right) => left.localeCompare(right, undefined, { sensitivity: "base" }));
      }

      function getSelectMeasureContext() {
        if (!getSelectMeasureContext.ctx) {
          const canvas = document.createElement("canvas");
          getSelectMeasureContext.ctx = canvas.getContext("2d");
        }
        return getSelectMeasureContext.ctx;
      }

      function syncSelectWidth(selectElement) {
        if (!(selectElement instanceof HTMLSelectElement)) {
          return;
        }
        const options = Array.from(selectElement.options || []);
        if (!options.length) {
          return;
        }
        const computed = window.getComputedStyle(selectElement);
        const measureCtx = getSelectMeasureContext();
        if (!measureCtx) {
          return;
        }
        measureCtx.font = [
          computed.fontStyle,
          computed.fontVariant,
          computed.fontWeight,
          computed.fontSize,
          computed.fontFamily,
        ]
          .filter(Boolean)
          .join(" ");
        let maxTextWidth = 0;
        options.forEach((option) => {
          const label = String(option.textContent || option.label || "").trim();
          maxTextWidth = Math.max(maxTextWidth, measureCtx.measureText(label).width);
        });
        const paddingLeft = Number.parseFloat(computed.paddingLeft || "0") || 0;
        const paddingRight = Number.parseFloat(computed.paddingRight || "0") || 0;
        const borderLeft = Number.parseFloat(computed.borderLeftWidth || "0") || 0;
        const borderRight = Number.parseFloat(computed.borderRightWidth || "0") || 0;
        const caretAllowance = 24;
        const widthPx = Math.ceil(maxTextWidth + paddingLeft + paddingRight + borderLeft + borderRight + caretAllowance);
        const normalizedId = String(selectElement.id || "").trim().toLowerCase();
        const maxBasisBySelectId = {
          methodpicker: 180,
          requestorpicker: 210,
          mvpdpicker: 460,
        };
        const cappedWidth = Math.min(
          maxBasisBySelectId[normalizedId] || 420,
          Math.max(56, widthPx)
        );
        selectElement.style.flexBasis = `${cappedWidth}px`;
        selectElement.style.width = "auto";
      }

      function syncHeaderControlWidths() {
        syncSelectWidth(els.methodPicker);
        syncSelectWidth(els.requestorPicker);
        syncSelectWidth(els.mvpdPicker);
      }

      function safeJsonParse(value, fallback = null) {
        const text = String(value || "").trim();
        if (!text) {
          return fallback;
        }
        try {
          return JSON.parse(text);
        } catch {
          return fallback;
        }
      }

      function formatDateTime(value) {
        const numeric = Number(value || 0);
        if (!Number.isFinite(numeric) || numeric <= 0) {
          return "N/A";
        }
        try {
          return new Date(numeric).toLocaleString();
        } catch {
          return "N/A";
        }
      }

      function getEmbeddedInputValue(name) {
        return String(document.querySelector(`input[name="${String(name || "").trim()}"]`)?.value ?? "").trim();
      }

      function normalizeTheme(theme) {
        return String(theme || "").trim().toLowerCase() === "dark" ? "dark" : "light";
      }

      function getThemeScope() {
        return firstNonEmptyString([
          getEmbeddedInputValue("theme_scope"),
          getEmbeddedInputValue("media_company_id"),
          getEmbeddedInputValue("cid"),
          document.title,
          "default",
        ]);
      }

      function getThemeStorageKey() {
        return `${THEME_STORAGE_KEY_PREFIX}:${getThemeScope()}`;
      }

      function readStoredTheme() {
        try {
          return localStorage.getItem(getThemeStorageKey());
        } catch {
          return null;
        }
      }

      function storeTheme(theme) {
        try {
          localStorage.setItem(getThemeStorageKey(), normalizeTheme(theme));
        } catch {
          // no-op
        }
      }

      function getActiveTheme() {
        return normalizeTheme(document.body?.dataset?.theme);
      }

      function refreshThemeToggleUi() {
        if (!els.themeToggle) {
          return;
        }
        const nextTheme = getActiveTheme() === "dark" ? "light" : "dark";
        const label = `Switch to ${nextTheme} theme`;
        els.themeToggle.setAttribute("title", label);
        els.themeToggle.setAttribute("aria-label", label);
      }

      function applyTheme(theme, { persist = true } = {}) {
        const normalized = normalizeTheme(theme);
        document.body.dataset.theme = normalized;
        if (persist) {
          storeTheme(normalized);
        }
        refreshThemeToggleUi();
      }

      function initTheme() {
        applyTheme(readStoredTheme(), { persist: false });
      }

      function getEnvironmentStorageScope() {
        return String(resolveAdobePassEnvironmentContext().spBase || ADOBE_SP_BASE || "").trim().toLowerCase();
      }

      function getScopedTokenStorageKey() {
        const clientId = String(getEmbeddedInputValue("cid") || "").trim().replace(/[^a-zA-Z0-9._-]+/g, "_");
        const envScope = getEnvironmentStorageScope().replace(/[^a-zA-Z0-9._-]+/g, "_") || "sp.auth.adobe.com";
        return clientId
          ? `${ACCESS_TOKEN_STORAGE_KEY_PREFIX}:${envScope}:${clientId}`
          : `${ACCESS_TOKEN_STORAGE_KEY_PREFIX}:${envScope}`;
      }

      function getToken() {
        const embedded = getEmbeddedInputValue("access_token");
        if (embedded) {
          return embedded;
        }
        try {
          const scoped = String(localStorage.getItem(getScopedTokenStorageKey()) || "").trim();
          if (scoped) {
            return scoped;
          }
          return "";
        } catch {
          return "";
        }
      }

      function setToken(tokenValue) {
        const normalized = String(tokenValue || "").trim();
        const hiddenTokenInput = document.querySelector('input[name="access_token"]');
        if (hiddenTokenInput) {
          hiddenTokenInput.value = normalized;
        }
        try {
          if (normalized) {
            localStorage.setItem(getScopedTokenStorageKey(), normalized);
          } else {
            localStorage.removeItem(getScopedTokenStorageKey());
          }
        } catch {
          // no-op
        }
      }

      function bootstrapEmbeddedAccessToken() {
        const embedded = getEmbeddedInputValue("access_token");
        if (!embedded) {
          return;
        }
        setToken(embedded);
      }

      async function refreshToken() {
        const cid = getEmbeddedInputValue("cid");
        const csc = getEmbeddedInputValue("csc");
        if (!cid || !csc) {
          throw new Error("Missing DCR client credentials in clickDGR export.");
        }

        const tokenUrl =
          `${ADOBE_SP_BASE}/o/client/token?grant_type=client_credentials` +
          `&client_id=${encodeURIComponent(cid)}` +
          `&client_secret=${encodeURIComponent(csc)}`;

        const response = await fetch(tokenUrl, {
          method: "POST",
        });
        if (!response.ok) {
          const failureText = String(await response.text().catch(() => "")).trim();
          throw new Error(`Token refresh failed (${response.status})${failureText ? `: ${failureText}` : "."}`);
        }

        const payload = safeJsonParse(await response.text().catch(() => ""), null);
        const accessToken = String(payload?.access_token || "").trim();
        if (!accessToken) {
          throw new Error("Token refresh returned no access_token.");
        }
        setToken(accessToken);
        return accessToken;
      }

      async function fetchWithPremiumAuth(url, init = {}, options = {}) {
        const retryUnauthorized = options?.retryUnauthorized !== false;
        const doFetch = async (tokenValue) => {
          const headers = {
            ...(init?.headers && typeof init.headers === "object" ? init.headers : {}),
            Authorization: `Bearer ${String(tokenValue || "").trim()}`,
          };
          return fetch(url, {
            ...init,
            headers,
          });
        };

        let tokenValue = getToken();
        if (!tokenValue) {
          tokenValue = await refreshToken();
        }

        let response = await doFetch(tokenValue);
        if (response.status === 401 && retryUnauthorized) {
          tokenValue = await refreshToken();
          response = await doFetch(tokenValue);
        }
        return response;
      }

      function setBusy(busy) {
        state.busy = busy === true;
        document.body.classList.toggle("net-busy", state.busy);
        if (els.netIndicator) {
          els.netIndicator.style.display = state.busy ? "inline-block" : "none";
        }
        if (els.methodPicker) {
          els.methodPicker.disabled = state.busy;
        }
        if (els.requestorPicker) {
          els.requestorPicker.disabled = state.busy;
        }
        if (els.mvpdPicker) {
          els.mvpdPicker.disabled = state.busy || els.requestorPicker?.disabled === true;
        }
        if (els.goButton) {
          els.goButton.disabled = state.busy;
        }
        refreshRerunAllButtonUi();
      }

      function setStatus(message = "", type = "info") {
        if (!els.statusLine) {
          return;
        }
        els.statusLine.textContent = String(message || "").trim();
        els.statusLine.classList.toggle("success", type === "success");
        els.statusLine.classList.toggle("error", type === "error");
      }

      function normalizeDefaultMvpdId(rawValue) {
        const normalized = String(rawValue || "").trim();
        const compact = normalized.toLowerCase().replace(/[\s_-]+/g, "");
        if (!compact || compact === "all" || compact === "allmvpds" || compact === "*") {
          return "";
        }
        return normalized;
      }

      function getEmbeddedRequestorIds() {
        const encoded = getEmbeddedInputValue("requestor_ids_json");
        if (!encoded) {
          return [];
        }
        try {
          const parsed = JSON.parse(decodeURIComponent(encoded));
          if (!Array.isArray(parsed)) {
            return [];
          }
          return uniqueSorted(parsed);
        } catch {
          return [];
        }
      }

      function getSelectedRequestorId() {
        return String(els.requestorPicker?.value || "").trim();
      }

      function getSelectedMvpdId() {
        return String(els.mvpdPicker?.value || "").trim();
      }

      async function loadMvpdMapForRequestor(requestorId) {
        const normalizedRequestorId = String(requestorId || "").trim();
        if (!normalizedRequestorId) {
          return new Map();
        }
        if (state.mvpdCacheByRequestor.has(normalizedRequestorId)) {
          return state.mvpdCacheByRequestor.get(normalizedRequestorId);
        }

        const mvpdMap = new Map();
        try {
          const response = await fetchWithPremiumAuth(
            `${ADOBE_SP_BASE}/api/v1/config/${encodeURIComponent(normalizedRequestorId)}`,
            {
              method: "GET",
            }
          );
          if (response.ok) {
            const responseText = await response.text().catch(() => "");
            const xmlDoc = new DOMParser().parseFromString(responseText, "application/xml");
            xmlDoc.querySelectorAll("mvpds > mvpd").forEach((mvpdNode) => {
              const idNode = mvpdNode.querySelector("id");
              if (!idNode) {
                return;
              }
              const mvpdId = String(idNode.textContent || "").trim();
              if (!mvpdId) {
                return;
              }
              const displayNameNode = mvpdNode.querySelector("displayName");
              const isProxyNode = mvpdNode.querySelector("isProxy");
              const mvpdName = String(displayNameNode?.textContent || "").trim() || mvpdId;
              const isProxyText = String(isProxyNode?.textContent || "").trim().toLowerCase();
              const isProxy = isProxyText === "false" ? false : true;
              mvpdMap.set(mvpdId, {
                name: mvpdName,
                isProxy,
              });
            });
          }
        } catch {
          // no-op; return empty list for this requestor.
        }

        state.mvpdCacheByRequestor.set(normalizedRequestorId, mvpdMap);
        return mvpdMap;
      }

      function renderMvpdOptions(requestorId, desiredMvpdId = "") {
        if (!els.mvpdPicker) {
          return;
        }

        const normalizedRequestorId = String(requestorId || "").trim();
        const mapForRequestor = state.mvpdCacheByRequestor.get(normalizedRequestorId) || new Map();
        const entries = [...mapForRequestor.entries()].sort((left, right) => {
          const leftName = String(left?.[1]?.name || left?.[0] || "").trim();
          const rightName = String(right?.[1]?.name || right?.[0] || "").trim();
          return leftName.localeCompare(rightName, undefined, { sensitivity: "base" });
        });

        els.mvpdPicker.innerHTML = "";

        const allOption = document.createElement("option");
        allOption.value = "";
        allOption.textContent = "ALL MVPDs";
        els.mvpdPicker.appendChild(allOption);

        entries.forEach(([mvpdId, meta]) => {
          const option = document.createElement("option");
          option.value = mvpdId;
          const mvpdName = String(meta?.name || mvpdId).trim() || mvpdId;
          option.textContent = `${mvpdName} (${mvpdId})`;
          option.style.fontWeight = meta?.isProxy === false ? "700" : "400";
          els.mvpdPicker.appendChild(option);
        });

        const normalizedDesiredMvpdId = String(desiredMvpdId || "").trim();
        if (normalizedDesiredMvpdId && entries.some(([mvpdId]) => mvpdId === normalizedDesiredMvpdId)) {
          els.mvpdPicker.value = normalizedDesiredMvpdId;
        } else {
          els.mvpdPicker.value = "";
        }
        syncSelectWidth(els.mvpdPicker);
      }

      async function onRequestorChange() {
        const requestorId = getSelectedRequestorId();
        if (!requestorId) {
          if (els.mvpdPicker) {
            els.mvpdPicker.innerHTML = "";
            const allOption = document.createElement("option");
            allOption.value = "";
            allOption.textContent = "ALL MVPDs";
            els.mvpdPicker.appendChild(allOption);
            els.mvpdPicker.value = "";
          }
          return;
        }

        const defaultRequestorId = getEmbeddedInputValue("default_requestor_id");
        const defaultMvpdId = normalizeDefaultMvpdId(getEmbeddedInputValue("default_mvpd_id"));
        const desiredMvpdId =
          requestorId === defaultRequestorId
            ? defaultMvpdId || getSelectedMvpdId()
            : getSelectedMvpdId();

        if (els.mvpdPicker) {
          els.mvpdPicker.disabled = true;
        }
        await loadMvpdMapForRequestor(requestorId);
        renderMvpdOptions(requestorId, desiredMvpdId);
        if (els.mvpdPicker) {
          els.mvpdPicker.disabled = state.busy;
        }
      }

      async function loadRequestorPicker() {
        if (!els.requestorPicker) {
          return;
        }

        const requestorIds = getEmbeddedRequestorIds();
        els.requestorPicker.innerHTML = "";

        if (requestorIds.length === 0) {
          els.requestorPicker.disabled = true;
          if (els.mvpdPicker) {
            els.mvpdPicker.disabled = true;
          }
          if (els.goButton) {
            els.goButton.disabled = true;
          }
          setStatus("No RequestorIds were embedded in this clickDGR export.", "error");
          syncHeaderControlWidths();
          return;
        }

        requestorIds.forEach((requestorId) => {
          const option = document.createElement("option");
          option.value = requestorId;
          option.textContent = requestorId;
          els.requestorPicker.appendChild(option);
        });

        els.requestorPicker.disabled = false;
        if (els.goButton) {
          els.goButton.disabled = false;
        }

        const defaultRequestorId = getEmbeddedInputValue("default_requestor_id");
        const selectedRequestorId =
          requestorIds.includes(defaultRequestorId) ? defaultRequestorId : requestorIds[0];
        els.requestorPicker.value = selectedRequestorId;
        await onRequestorChange();
        syncHeaderControlWidths();
      }

      function getEndpointSpec(key) {
        const normalizedKey = String(key || "").trim().toLowerCase();
        if (!normalizedKey) {
          return null;
        }
        if (normalizedKey === MEGA_ENDPOINT_SPEC.key) {
          return MEGA_ENDPOINT_SPEC;
        }
        return ENDPOINT_SPECS.find((entry) => entry.key === normalizedKey) || null;
      }

      function buildScopeLabel(queryValues = {}) {
        if (queryValues.includeAllMvpd === true || !queryValues.mvpd) {
          return "ALL MVPDs";
        }
        return formatMvpdDisplayValue(queryValues.requestorId, queryValues.mvpd);
      }

      function buildRequestUrl(endpointSpec, queryValues = {}) {
        const mediaCompanyId = getEmbeddedInputValue("media_company_id");
        if (!mediaCompanyId) {
          throw new Error("Media company is missing from clickDGR export.");
        }
        if (!endpointSpec?.path) {
          throw new Error("DEGRADATION endpoint path is missing.");
        }

        const url = new URL(
          `${DEGRADATION_API_BASE}/${encodeURIComponent(mediaCompanyId)}/${encodeURIComponent(String(endpointSpec.path).trim())}`
        );
        url.searchParams.set("programmer", String(queryValues.programmerId || "").trim());
        if (!queryValues.includeAllMvpd && queryValues.mvpd) {
          url.searchParams.set("mvpd", String(queryValues.mvpd || "").trim());
        }
        url.searchParams.set("format", "json");

        if (String(endpointSpec.key || "").trim().toLowerCase() === MEGA_ENDPOINT_SPEC.key) {
          url.searchParams.set("media-company", mediaCompanyId);
          url.searchParams.set("resource", "");
          url.searchParams.set("channel", "");
          url.searchParams.set("includeHistory", "false");
        }
        return url;
      }

      function collectQueryValues(endpointKey = "") {
        const requestorId = getSelectedRequestorId();
        const normalizedEndpointKey = firstNonEmptyString([
          String(endpointKey || "").trim().toLowerCase(),
          String(els.methodPicker?.value || "").trim().toLowerCase(),
          "all",
        ]);

        const mvpd = getSelectedMvpdId();
        const includeAllMvpd = !mvpd;

        return {
          requestorId,
          programmerId: requestorId,
          endpointKey: normalizedEndpointKey,
          includeAllMvpd,
          mvpd,
          apiVersion: DEGRADATION_API_VERSION,
        };
      }

      function normalizeObjectKeys(value) {
        if (Array.isArray(value)) {
          return value.map((item) => normalizeObjectKeys(item));
        }
        if (!value || typeof value !== "object") {
          return value;
        }
        const output = {};
        Object.entries(value).forEach(([rawKey, rawValue]) => {
          const normalizedKey = String(rawKey || "").trim();
          if (!normalizedKey) {
            return;
          }
          output[normalizedKey] = normalizeObjectKeys(rawValue);
        });
        return output;
      }

      function getObjectValueByKeys(source, keyCandidates = []) {
        if (!source || typeof source !== "object") {
          return undefined;
        }
        const lookup = new Set(
          (Array.isArray(keyCandidates) ? keyCandidates : [])
            .map((value) => String(value || "").trim().toLowerCase())
            .filter(Boolean)
        );
        if (!lookup.size) {
          return undefined;
        }
        for (const [rawKey, rawValue] of Object.entries(source)) {
          if (lookup.has(String(rawKey || "").trim().toLowerCase())) {
            return rawValue;
          }
        }
        return undefined;
      }

      function toArray(value) {
        if (Array.isArray(value)) {
          return value;
        }
        if (value == null) {
          return [];
        }
        return [value];
      }

      function resolveIdValue(value, fallback = "") {
        if (value == null) {
          return String(fallback || "").trim();
        }
        if (typeof value === "string" || typeof value === "number" || typeof value === "boolean") {
          return firstNonEmptyString([String(value).trim(), String(fallback || "").trim()]);
        }
        if (typeof value === "object") {
          return firstNonEmptyString([
            String(value.id || "").trim(),
            String(value.identifier || "").trim(),
            String(value.name || "").trim(),
            String(value.value || "").trim(),
            String(fallback || "").trim(),
          ]);
        }
        return String(fallback || "").trim();
      }

      function coerceBooleanValue(value) {
        if (typeof value === "boolean") {
          return value;
        }
        const normalized = String(value == null ? "" : value).trim().toLowerCase();
        if (normalized === "true" || normalized === "1" || normalized === "yes") {
          return true;
        }
        if (normalized === "false" || normalized === "0" || normalized === "no") {
          return false;
        }
        return null;
      }

      function formatActivationTimeValue(value) {
        if (value == null) {
          return "N/A";
        }
        const text = String(value).trim();
        if (!text) {
          return "N/A";
        }
        const numeric = Number(text);
        if (Number.isFinite(numeric) && numeric > 0) {
          const asMs = numeric > 1_000_000_000_000 ? numeric : numeric > 1_000_000_000 ? numeric * 1000 : numeric;
          try {
            return new Date(asMs).toLocaleString();
          } catch {
            return text;
          }
        }
        return text;
      }

      function formatMvpdDisplayValue(requestorId = "", mvpdId = "") {
        const normalizedMvpdId = String(mvpdId || "").trim();
        if (!normalizedMvpdId) {
          return "N/A";
        }
        const compact = normalizedMvpdId.toLowerCase().replace(/[\s_-]+/g, "");
        if (compact === "all" || compact === "allmvpds" || compact === "*") {
          return "ALL MVPDs";
        }

        const normalizedRequestorId = String(requestorId || "").trim();
        const preferredMap = state.mvpdCacheByRequestor.get(normalizedRequestorId);
        const directMeta = preferredMap ? preferredMap.get(normalizedMvpdId) : null;
        if (directMeta?.name) {
          const name = String(directMeta.name || "").trim();
          return name && name !== normalizedMvpdId ? `${name} (${normalizedMvpdId})` : normalizedMvpdId;
        }

        for (const map of state.mvpdCacheByRequestor.values()) {
          const meta = map?.get?.(normalizedMvpdId) || null;
          if (meta?.name) {
            const name = String(meta.name || "").trim();
            return name && name !== normalizedMvpdId ? `${name} (${normalizedMvpdId})` : normalizedMvpdId;
          }
        }

        return normalizedMvpdId;
      }

      function buildStatusRow(endpointSpec, baseValues, targetNode, targetType, targetIdFallback = "") {
        const detail = targetNode && typeof targetNode === "object" ? targetNode : {};
        const enabledRaw = getObjectValueByKeys(detail, [
          "degradation-measure-enable",
          "degradationmeasureenable",
          "enabled",
        ]);
        const statusRaw = getObjectValueByKeys(detail, [
          "degradation-measure-status",
          "degradationmeasurestatus",
          "status",
        ]);
        const ttlRaw = getObjectValueByKeys(detail, ["ttl"]);
        const errMsg = firstNonEmptyString([
          String(getObjectValueByKeys(detail, ["err-msg", "errmsg", "message"]) || "").trim(),
        ]);
        const activationRaw = getObjectValueByKeys(detail, [
          "activation-time",
          "activation_time",
          "activationtime",
        ]);
        const enabled = coerceBooleanValue(enabledRaw);
        const status = String(statusRaw == null ? "" : statusRaw).trim().toUpperCase();
        const active = enabled === true && status === "APPLIED";
        const ttlNumeric = Number(ttlRaw);
        const ttlLabel = Number.isFinite(ttlNumeric) && ttlNumeric > 0 ? String(ttlNumeric) : "N/A";
        const resolvedTargetId = firstNonEmptyString([
          resolveIdValue(detail, ""),
          String(targetIdFallback || "").trim(),
        ]);

        return {
          Rule: endpointSpec.title,
          "Measure ID": String(baseValues.measureId || endpointSpec.measureId || endpointSpec.path || "").trim(),
          Programmer: String(baseValues.programmerId || "").trim() || "N/A",
          MVPD: formatMvpdDisplayValue(baseValues.requestorId, baseValues.mvpdId),
          "Target Type": String(targetType || endpointSpec.targetType || "").trim() || "N/A",
          Target: resolvedTargetId || "N/A",
          Enabled: enabled == null ? "N/A" : enabled ? "true" : "false",
          Status: status || "N/A",
          Active: active ? "YES" : "NO",
          "TTL (s)": ttlLabel,
          Message: errMsg || "N/A",
          "Activation Time": formatActivationTimeValue(activationRaw),
        };
      }

      function extractRowsFromMegaPayload(parsedPayload, queryValues = {}) {
        const normalizedPayload = normalizeObjectKeys(parsedPayload);
        const payloadObject = normalizedPayload && typeof normalizedPayload === "object" ? normalizedPayload : {};
        const rootMeasure =
          getObjectValueByKeys(payloadObject, ["degradation-measure", "degradation_measure", "degradationmeasure"]) ||
          payloadObject;
        const root = rootMeasure && typeof rootMeasure === "object" ? rootMeasure : {};

        const rows = [];

        const pushRowsFromRuleCollection = (ruleCollection, endpointTitle, targetType, targetKey) => {
          const rules = toArray(ruleCollection);
          rules.forEach((ruleNode) => {
            const ruleObject = ruleNode && typeof ruleNode === "object" ? ruleNode : {};
            const measure =
              getObjectValueByKeys(ruleObject, ["degradation-measure", "degradation_measure", "degradationmeasure"]) ||
              ruleObject;
            const measureObject = measure && typeof measure === "object" ? measure : {};
            const programmerNode = getObjectValueByKeys(measureObject, ["programmer"]);
            const programmerList = toArray(programmerNode);
            const programmerTarget =
              programmerList[0] && typeof programmerList[0] === "object" ? programmerList[0] : programmerNode;
            const programmerId = resolveIdValue(programmerTarget, queryValues.programmerId);
            const mvpdNode = getObjectValueByKeys(measureObject, ["mvpd"]);
            const mvpdFallback = queryValues.includeAllMvpd ? "ALL" : queryValues.mvpd;
            const mvpdId = resolveIdValue(mvpdNode, mvpdFallback);

            const baseValues = {
              measureId: firstNonEmptyString([
                String(measureObject.id || "").trim(),
                String(endpointTitle || "").trim().toLowerCase().replace(/\s+/g, "-"),
              ]),
              requestorId: String(queryValues.requestorId || "").trim(),
              programmerId,
              mvpdId,
            };

            const rowEndpointSpec = {
              title: endpointTitle,
              measureId: baseValues.measureId,
              path: MEGA_ENDPOINT_SPEC.path,
              targetType,
              targetKey,
            };

            if (targetType === "programmer") {
              const detailNode = programmerTarget && typeof programmerTarget === "object" ? programmerTarget : measureObject;
              rows.push(
                buildStatusRow(
                  rowEndpointSpec,
                  baseValues,
                  detailNode,
                  targetType,
                  resolveIdValue(programmerTarget, programmerId)
                )
              );
              return;
            }

            const targets = toArray(getObjectValueByKeys(measureObject, [targetKey]));
            if (targets.length === 0) {
              rows.push(
                buildStatusRow(
                  rowEndpointSpec,
                  baseValues,
                  measureObject,
                  targetType,
                  String(queryValues.mvpd || "").trim()
                )
              );
              return;
            }

            targets.forEach((targetNode) => {
              rows.push(
                buildStatusRow(
                  rowEndpointSpec,
                  baseValues,
                  targetNode && typeof targetNode === "object" ? targetNode : {},
                  targetType,
                  resolveIdValue(targetNode, "")
                )
              );
            });
          });
        };

        pushRowsFromRuleCollection(root?.authnRules, "Authenticate All - Status", "programmer", "programmer");
        pushRowsFromRuleCollection(root?.authzRules, "Authorize All - Status", "resource", "resource");
        pushRowsFromRuleCollection(root?.authzNoneRules, "Authorize None - Status", "channel", "channel");

        return rows;
      }

      function extractRows(endpointSpec, parsedPayload, queryValues = {}) {
        if (String(endpointSpec?.key || "").trim().toLowerCase() === MEGA_ENDPOINT_SPEC.key) {
          return extractRowsFromMegaPayload(parsedPayload, queryValues);
        }

        const normalizedPayload = normalizeObjectKeys(parsedPayload);
        const payloadObject = normalizedPayload && typeof normalizedPayload === "object" ? normalizedPayload : {};
        const measureContainer =
          getObjectValueByKeys(payloadObject, ["degradation-measure", "degradation_measure", "degradationmeasure"]) ||
          payloadObject;
        const measures = toArray(measureContainer);

        const rows = [];
        measures.forEach((measureNode) => {
          const measureObject = measureNode && typeof measureNode === "object" ? measureNode : {};
          const programmerNode = getObjectValueByKeys(measureObject, ["programmer"]);
          const programmerId = resolveIdValue(programmerNode, queryValues.programmerId);
          const mvpdNode = getObjectValueByKeys(measureObject, ["mvpd"]);
          const mvpdFallback = queryValues.includeAllMvpd ? "ALL" : queryValues.mvpd;
          const mvpdId = resolveIdValue(mvpdNode, mvpdFallback);

          const baseValues = {
            measureId: firstNonEmptyString([
              String(measureObject.id || "").trim(),
              String(endpointSpec.measureId || endpointSpec.path || "").trim(),
            ]),
            requestorId: String(queryValues.requestorId || "").trim(),
            programmerId,
            mvpdId,
          };

          if (endpointSpec.targetType === "programmer") {
            const detailNode = programmerNode && typeof programmerNode === "object" ? programmerNode : measureObject;
            rows.push(
              buildStatusRow(
                endpointSpec,
                baseValues,
                detailNode,
                endpointSpec.targetType,
                resolveIdValue(programmerNode, programmerId)
              )
            );
            return;
          }

          const targetList = toArray(getObjectValueByKeys(measureObject, [endpointSpec.targetKey]));
          if (targetList.length === 0) {
            rows.push(
              buildStatusRow(endpointSpec, baseValues, measureObject, endpointSpec.targetType, queryValues.mvpd || "")
            );
            return;
          }

          targetList.forEach((targetNode) => {
            rows.push(
              buildStatusRow(
                endpointSpec,
                baseValues,
                targetNode && typeof targetNode === "object" ? targetNode : {},
                endpointSpec.targetType,
                resolveIdValue(targetNode, "")
              )
            );
          });
        });

        return rows;
      }

      function filterAppliedActiveRows(rows = []) {
        if (!Array.isArray(rows)) {
          return [];
        }
        return rows.filter((row) => {
          const status = String(row?.Status || "").trim().toUpperCase();
          const active = String(row?.Active || "").trim().toUpperCase();
          return status === "APPLIED" && active === "YES";
        });
      }

      function buildPremiumErrorMessage(status = 0, statusText = "", responseText = "") {
        const statusCode = Number(status || 0);
        const normalizedStatusText = String(statusText || "").trim();
        const messageByStatusCode = {
          400: "Bad request. Check Programmer/MVPD parameters and retry.",
          401: "Unauthorized. Refresh DCR auth and verify IP allowlist access.",
          403: "Forbidden for this DEGRADATION app scope.",
          404: "DEGRADATION endpoint not found for this environment.",
          405: "Method not allowed for this DEGRADATION endpoint.",
          429: "Rate limited by DEGRADATION API (max 2 calls/minute per client IP).",
          500: "DEGRADATION service internal error.",
          502: "DEGRADATION service gateway error.",
          503: "DEGRADATION service temporarily unavailable.",
          504: "DEGRADATION service timeout.",
        };

        const baseMessage = messageByStatusCode[statusCode] || "DEGRADATION request failed.";
        const compactReason = String(responseText || normalizedStatusText)
          .replace(/[\r\n\t]+/g, " ")
          .replace(/\s+/g, " ")
          .trim();
        const isStructuredPayload = /[<>{}\[\]]/.test(compactReason);
        const safeReason =
          compactReason &&
          !isStructuredPayload &&
          compactReason.length <= 140 &&
          compactReason.toLowerCase() !== normalizedStatusText.toLowerCase()
            ? compactReason
            : "";

        const httpLabel = statusCode > 0 ? `HTTP ${statusCode}` : "Request Error";
        return safeReason ? `${httpLabel}: ${baseMessage} ${safeReason}` : `${httpLabel}: ${baseMessage}`;
      }

      function buildReportPayload(endpointSpec, queryValues, result = {}) {
        const sourceRows = Array.isArray(result.rows) ? result.rows : [];
        const rows = filterAppliedActiveRows(sourceRows);
        const columns = rows.length > 0 ? Object.keys(rows[0]) : DEFAULT_COLUMNS.slice();
        const activeCount = rows.reduce(
          (count, row) => count + (String(row?.Active || "").trim().toUpperCase() === "YES" ? 1 : 0),
          0
        );

        const queryKey = [
          String(endpointSpec?.key || "").trim(),
          `programmer=${String(queryValues?.programmerId || "").trim()}`,
          `mvpd=${String(queryValues?.mvpd || "*").trim() || "*"}`,
          `api_version=${String(queryValues?.apiVersion || "*").trim() || "*"}`,
        ].join("|");

        return {
          reportId: `clickdgr-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`,
          queryKey,
          endpointKey: String(endpointSpec?.key || "").trim(),
          endpointPath: String(endpointSpec?.path || "").trim(),
          endpointTitle: String(endpointSpec?.title || "DEGRADATION Status").trim(),
          requestUrl: String(result.requestUrl || "").trim(),
          method: "GET",
          programmerId: String(queryValues?.programmerId || "").trim(),
          requestorId: String(queryValues?.requestorId || "").trim(),
          mvpd: String(queryValues?.mvpd || "").trim(),
          includeAllMvpd: queryValues?.includeAllMvpd === true,
          mvpdScopeLabel: buildScopeLabel(queryValues),
          apiVersion: String(queryValues?.apiVersion || "").trim(),
          ok: result.ok === true,
          status: Number(result.status || 0),
          statusText: String(result.statusText || "").trim(),
          error: String(result.error || "").trim(),
          columns,
          rows,
          rowCount: rows.length,
          activeCount,
          fetchedAt: Number(result.fetchedAt || Date.now()),
          durationMs: Number(result.durationMs || 0),
        };
      }

      async function executeStatusRequest(endpointSpec, queryValues = {}) {
        const requestorId = String(queryValues.requestorId || "").trim();
        if (!requestorId) {
          throw new Error("Select RequestorId first");
        }
        if (!queryValues.programmerId) {
          throw new Error("Programmer value could not be derived from the selected RequestorId.");
        }

        const requestUrl = buildRequestUrl(endpointSpec, queryValues);
        const requestStartedAt = Date.now();
        const response = await fetchWithPremiumAuth(
          requestUrl.toString(),
          {
            method: "GET",
          },
          {
            retryUnauthorized: true,
          }
        );

        const responseText = await response.text().catch(() => "");
        const fetchedAt = Date.now();
        const durationMs = fetchedAt - requestStartedAt;

        if (!response.ok) {
          return buildReportPayload(endpointSpec, queryValues, {
            ok: false,
            status: Number(response.status || 0),
            statusText: String(response.statusText || "").trim(),
            error: buildPremiumErrorMessage(response.status, response.statusText, responseText),
            rows: [],
            requestUrl: requestUrl.toString(),
            fetchedAt,
            durationMs,
          });
        }

        if (response.status === 204 || !responseText.trim()) {
          return buildReportPayload(endpointSpec, queryValues, {
            ok: true,
            status: Number(response.status || 0),
            statusText: String(response.statusText || "").trim(),
            rows: [],
            requestUrl: requestUrl.toString(),
            fetchedAt,
            durationMs,
          });
        }

        const parsedPayload = safeJsonParse(responseText, null);
        if (!parsedPayload || typeof parsedPayload !== "object") {
          throw new Error(`DEGRADATION status response is not valid JSON (HTTP ${response.status}).`);
        }

        const rows = extractRows(endpointSpec, parsedPayload, queryValues);
        return buildReportPayload(endpointSpec, queryValues, {
          ok: true,
          status: Number(response.status || 0),
          statusText: String(response.statusText || "").trim(),
          rows,
          requestUrl: requestUrl.toString(),
          fetchedAt,
          durationMs,
        });
      }

      function getScopeValues(report = null) {
        const requestor = firstNonEmptyString([report?.requestorId, report?.programmerId, getSelectedRequestorId(), "N/A"]);
        const scope = firstNonEmptyString([report?.mvpdScopeLabel, report?.mvpd, "ALL MVPDs"]);
        return {
          requestor,
          scope,
        };
      }

      function getNoRulesScopeLabel(report = null) {
        const { requestor, scope } = getScopeValues(report);
        return `${requestor} X ${scope}`;
      }

      function getNoRulesActiveMessage(report = null) {
        return `No rules active for ${getNoRulesScopeLabel(report)}.`;
      }

      function getNoRulesCompactMessage(report = null) {
        const methodLabel = firstNonEmptyString([report?.endpointTitle, "DEGRADATION Status"]);
        return `${methodLabel}: ${getNoRulesActiveMessage(report)}`;
      }

      function renderScopeEmphasisHtml(report = null) {
        const { requestor, scope } = getScopeValues(report);
        return `<span class="report-scope-value">${escapeHtml(requestor)}</span><span class="report-scope-sep"> X </span><span class="report-scope-value">${escapeHtml(scope)}</span>`;
      }

      function renderNoRulesCompactHtml(report = null) {
        const methodLabel = firstNonEmptyString([report?.endpointTitle, "DEGRADATION Status"]);
        return `${escapeHtml(methodLabel)}: No rules active for ${renderScopeEmphasisHtml(report)}.`;
      }

      function formatCellValue(rawValue) {
        if (rawValue == null) {
          return "N/A";
        }
        if (Array.isArray(rawValue)) {
          const compactValues = rawValue
            .map((item) => formatCellValue(item))
            .filter((item) => item && item !== "N/A");
          return compactValues.length > 0 ? compactValues.join(" | ") : "N/A";
        }
        if (typeof rawValue === "object") {
          const preferred = firstNonEmptyString([
            rawValue.id,
            rawValue.name,
            rawValue.label,
            rawValue.value,
            rawValue.status,
            rawValue.message,
          ]);
          return preferred || "Structured value";
        }

        const text = String(rawValue).trim();
        if (!text) {
          return "N/A";
        }
        if (
          (text.startsWith("{") && text.endsWith("}")) ||
          (text.startsWith("[") && text.endsWith("]")) ||
          (text.startsWith("<") && text.endsWith(">"))
        ) {
          return "Structured value";
        }
        return text;
      }

      function getReportSortKey(report = null) {
        if (!report || typeof report !== "object") {
          return "";
        }
        return firstNonEmptyString([report.queryKey, report.reportId]);
      }

      function getReportSortState(report = null) {
        const key = getReportSortKey(report);
        if (!key) {
          return null;
        }
        const current = state.reportSortByQueryKey.get(key);
        if (!current || typeof current !== "object") {
          return null;
        }
        const column = String(current.column || "").trim();
        const direction = String(current.direction || "").trim().toLowerCase() === "asc" ? "asc" : "desc";
        if (!column) {
          return null;
        }
        return { column, direction };
      }

      function setReportSortState(report = null, column = "", direction = "desc") {
        const key = getReportSortKey(report);
        const normalizedColumn = String(column || "").trim();
        if (!key || !normalizedColumn) {
          return;
        }
        state.reportSortByQueryKey.set(key, {
          column: normalizedColumn,
          direction: String(direction || "").trim().toLowerCase() === "asc" ? "asc" : "desc",
        });
      }

      function clearReportSortState(report = null) {
        const key = getReportSortKey(report);
        if (!key) {
          return;
        }
        state.reportSortByQueryKey.delete(key);
      }

      function toSortablePrimitive(rawValue) {
        if (rawValue == null) {
          return "";
        }
        if (Array.isArray(rawValue)) {
          return rawValue.map((item) => toSortablePrimitive(item)).join(" | ");
        }
        if (typeof rawValue === "object") {
          return firstNonEmptyString([
            rawValue.id,
            rawValue.name,
            rawValue.label,
            rawValue.value,
            rawValue.status,
            rawValue.message,
          ]);
        }
        const text = String(rawValue).trim();
        if (!text || text.toUpperCase() === "N/A") {
          return "";
        }
        return text;
      }

      function compareSortPrimitives(leftValue, rightValue) {
        const left = toSortablePrimitive(leftValue);
        const right = toSortablePrimitive(rightValue);
        if (!left && !right) {
          return 0;
        }
        if (!left) {
          return 1;
        }
        if (!right) {
          return -1;
        }

        const numericPattern = /^-?\d+(?:\.\d+)?$/;
        const isLeftNumeric = numericPattern.test(left);
        const isRightNumeric = numericPattern.test(right);
        if (isLeftNumeric && isRightNumeric) {
          const leftNumber = Number(left);
          const rightNumber = Number(right);
          if (leftNumber < rightNumber) {
            return -1;
          }
          if (leftNumber > rightNumber) {
            return 1;
          }
          return 0;
        }

        const leftDate = Date.parse(left);
        const rightDate = Date.parse(right);
        if (Number.isFinite(leftDate) && Number.isFinite(rightDate)) {
          if (leftDate < rightDate) {
            return -1;
          }
          if (leftDate > rightDate) {
            return 1;
          }
          return 0;
        }

        return String(left).localeCompare(String(right), undefined, {
          sensitivity: "base",
          numeric: true,
        });
      }

      function getSortedReportRows(report = null) {
        const rows = Array.isArray(report?.rows) ? [...report.rows] : [];
        if (rows.length <= 1) {
          return rows;
        }
        const sortState = getReportSortState(report);
        if (!sortState) {
          return rows;
        }
        const directionMultiplier = sortState.direction === "asc" ? 1 : -1;
        return rows.sort((leftRow, rightRow) => {
          const comparison = compareSortPrimitives(leftRow?.[sortState.column], rightRow?.[sortState.column]);
          return comparison * directionMultiplier;
        });
      }

      function sanitizeCsvCell(value) {
        const text = String(value ?? "");
        return `"${text.replace(/"/g, '""')}"`;
      }

      function sanitizeFileNameSegment(value, fallback = "value") {
        const text = String(value || "")
          .trim()
          .replace(/[^a-z0-9]+/gi, "-")
          .replace(/^-+|-+$/g, "");
        return text || fallback;
      }

      function resolveEnvironmentFileTag(urlValue = "") {
        const raw = String(urlValue || DEGRADATION_API_BASE || "").trim().toLowerCase();
        return raw.includes("staging") || raw.includes("stage") ? "STAGE" : "PROD";
      }

      function buildReportCsvFileName(report = null) {
        const mediaCompany = sanitizeFileNameSegment(
          firstNonEmptyString([getEmbeddedInputValue("media_company_name"), getEmbeddedInputValue("media_company_id")]),
          "MediaCompany"
        );
        const endpoint = sanitizeFileNameSegment(firstNonEmptyString([report?.endpointKey, report?.endpointPath]), "dgr");
        const requestor = sanitizeFileNameSegment(firstNonEmptyString([report?.requestorId, report?.programmerId]), "requestor");
        const scope = sanitizeFileNameSegment(report?.mvpd || "all-mvpds", "all-mvpds");
        const envTag = resolveEnvironmentFileTag(firstNonEmptyString([report?.requestUrl, DEGRADATION_API_BASE]));
        const stamp = new Date(report?.fetchedAt || Date.now()).toISOString().replace(/[:.]/g, "-");
        return `${mediaCompany}_clickDGR_${endpoint}_${requestor}_${scope}_${envTag}_${stamp}.csv`;
      }

      function triggerFileDownload(content, fileName, mimeType = "text/plain;charset=utf-8") {
        const blob = new Blob([content], { type: mimeType });
        const blobUrl = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = blobUrl;
        anchor.download = fileName;
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
      }

      async function copyTextToClipboard(text = "") {
        const normalized = String(text || "");
        if (!normalized) {
          return false;
        }

        if (navigator?.clipboard?.writeText) {
          try {
            await navigator.clipboard.writeText(normalized);
            return true;
          } catch {
            // continue to fallback
          }
        }

        const textArea = document.createElement("textarea");
        textArea.value = normalized;
        textArea.setAttribute("readonly", "readonly");
        textArea.style.position = "fixed";
        textArea.style.opacity = "0";
        textArea.style.pointerEvents = "none";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        let copied = false;
        try {
          copied = document.execCommand("copy");
        } catch {
          copied = false;
        } finally {
          textArea.remove();
        }
        return copied;
      }

      function findReportById(reportId = "") {
        const normalizedId = String(reportId || "").trim();
        if (!normalizedId) {
          return null;
        }
        return state.reports.find((entry) => String(entry?.reportId || "").trim() === normalizedId) || null;
      }

      function downloadReportCsv(reportId = "") {
        const report = findReportById(reportId);
        if (!report || !report.ok) {
          return;
        }
        const columns = Array.isArray(report.columns) ? report.columns : [];
        const rows = getSortedReportRows(report);
        if (!columns.length || !rows.length) {
          return;
        }

        const csvBody = [
          columns.map((column) => sanitizeCsvCell(column)).join(","),
          ...rows.map((row) =>
            columns.map((column) => sanitizeCsvCell(formatCellValue(row?.[column]))).join(",")
          ),
        ].join("\n");

        triggerFileDownload(csvBody, buildReportCsvFileName(report), "text/csv;charset=utf-8");
      }

      async function copyReportRequestUrl(reportId = "") {
        const report = findReportById(reportId);
        if (!report) {
          return;
        }
        const rawRequestUrl = firstNonEmptyString([report.requestUrl]);
        if (!rawRequestUrl) {
          setStatus("Request URL unavailable for copy.", "error");
          return;
        }
        const copied = await copyTextToClipboard(rawRequestUrl);
        if (copied) {
          setStatus("DEGRADATION request URL copied.", "success");
        } else {
          setStatus("Unable to copy DEGRADATION request URL.", "error");
        }
      }

      function buildQueryValuesFromReport(report = null) {
        const endpointKey = String(report?.endpointKey || "all").trim().toLowerCase();
        const requestorId = firstNonEmptyString([report?.requestorId, report?.programmerId]);
        const programmerId = firstNonEmptyString([report?.programmerId, report?.requestorId]);
        const includeAllMvpd = report?.includeAllMvpd === true || !String(report?.mvpd || "").trim();
        return {
          requestorId,
          programmerId,
          endpointKey,
          includeAllMvpd,
          mvpd: includeAllMvpd ? "" : String(report?.mvpd || "").trim(),
          apiVersion: String(report?.apiVersion || DEGRADATION_API_VERSION).trim(),
        };
      }

      function getRerunnableReports() {
        return state.reports.filter((report) => {
          const reportId = String(report?.reportId || "").trim();
          const endpointKey = String(report?.endpointKey || "").trim();
          const requestorId = firstNonEmptyString([report?.requestorId, report?.programmerId]);
          return Boolean(reportId && endpointKey && requestorId);
        });
      }

      function refreshRerunAllButtonUi() {
        if (!els.rerunAllButton) {
          return;
        }
        const count = getRerunnableReports().length;
        const batchBusy = Boolean(rerunAllReportsInFlight);
        const noun = count === 1 ? "open DEGRADATION report card" : "open DEGRADATION report cards";
        let label = "No DEGRADATION report cards are open to re-run";
        if (count > 0 && batchBusy) {
          label = `Re-running ${count} ${noun} with the current context`;
        } else if (count > 0 && state.busy) {
          label = `Finish the current DEGRADATION request before re-running all ${noun}`;
        } else if (count > 0) {
          label = `Re-run ${count} ${noun} with the current context`;
        }
        els.rerunAllButton.disabled = batchBusy || state.busy || count === 0;
        els.rerunAllButton.classList.toggle("is-busy", batchBusy);
        els.rerunAllButton.setAttribute("aria-label", label);
        els.rerunAllButton.title = label;
      }

      async function rerunReport(report = null, { clearSort = false } = {}) {
        if (!report) {
          throw new Error("Unable to resolve DEGRADATION report for rerun.");
        }
        const endpointSpec = getEndpointSpec(report.endpointKey);
        if (!endpointSpec) {
          throw new Error("Unable to resolve DEGRADATION method for rerun.");
        }
        const queryValues = buildQueryValuesFromReport(report);
        if (!queryValues.requestorId) {
          throw new Error("Select RequestorId first");
        }

        if (clearSort) {
          clearReportSortState(report);
        }

        const refreshedReport = await executeStatusRequest(endpointSpec, queryValues);
        upsertReport(refreshedReport);
        return refreshedReport;
      }

      async function rerunReportById(reportId = "", { clearSort = false } = {}) {
        if (state.busy || rerunAllReportsInFlight) {
          return;
        }
        const report = findReportById(reportId);
        if (!report) {
          return;
        }
        setBusy(true);
        setStatus(`Re-running ${report.endpointTitle || "DEGRADATION request"}...`, "info");
        try {
          const refreshedReport = await rerunReport(report, { clearSort });
          if (refreshedReport.ok) {
            setStatus("", "info");
          } else {
            setStatus(`${refreshedReport.endpointTitle}: ${refreshedReport.error || "Request failed."}`, "error");
          }
        } catch (error) {
          setStatus(error instanceof Error ? error.message : String(error), "error");
        } finally {
          setBusy(false);
        }
      }

      async function rerunAllReports() {
        if (rerunAllReportsInFlight || state.busy) {
          return rerunAllReportsInFlight;
        }
        const reportIds = getRerunnableReports()
          .map((report) => String(report?.reportId || "").trim())
          .filter(Boolean);
        if (!reportIds.length) {
          refreshRerunAllButtonUi();
          return;
        }

        rerunAllReportsInFlight = (async () => {
          let okCount = 0;
          let failureMessage = "";
          setBusy(true);
          setStatus(`Re-running ${reportIds.length} DEGRADATION report(s)...`, "info");
          try {
            for (const reportId of reportIds) {
              const report = findReportById(reportId);
              if (!report) {
                continue;
              }
              try {
                const refreshedReport = await rerunReport(report, { clearSort: true });
                if (refreshedReport?.ok) {
                  okCount += 1;
                } else if (!failureMessage) {
                  failureMessage = `${refreshedReport?.endpointTitle || "DEGRADATION request"}: ${refreshedReport?.error || "Request failed."}`;
                }
              } catch (error) {
                if (!failureMessage) {
                  failureMessage = error instanceof Error ? error.message : String(error);
                }
              }
            }
            if (okCount === reportIds.length) {
              setStatus(`Re-run completed for ${okCount} report(s).`, "success");
            } else {
              setStatus(
                `Re-run completed for ${okCount}/${reportIds.length} report(s).${failureMessage ? ` ${failureMessage}` : ""}`,
                "error"
              );
            }
          } finally {
            setBusy(false);
          }
        })();

        try {
          return await rerunAllReportsInFlight;
        } finally {
          rerunAllReportsInFlight = null;
          refreshRerunAllButtonUi();
        }
      }

      function toggleReportSort(reportId = "", column = "") {
        const report = findReportById(reportId);
        const normalizedColumn = String(column || "").trim();
        if (!report || !normalizedColumn) {
          return;
        }
        const existingSort = getReportSortState(report);
        if (existingSort && existingSort.column === normalizedColumn) {
          const nextDirection = existingSort.direction === "asc" ? "desc" : "asc";
          setReportSortState(report, normalizedColumn, nextDirection);
        } else {
          setReportSortState(report, normalizedColumn, "desc");
        }
        renderReports();
      }

      function renderReportFooter(report = null) {
        if (!report || !report.ok || Number(report.rowCount || 0) <= 0) {
          return "";
        }
        const reportIdAttr = escapeHtml(String(report.reportId || ""));
        return `
          <footer class="report-footer">
            <a class="report-csv-link" href="#" data-action="download-csv" data-report-id="${reportIdAttr}">CSV</a>
            <div class="report-footer-controls">
              <button
                type="button"
                class="report-action-btn report-action-rerun"
                data-action="rerun-report"
                data-report-id="${reportIdAttr}"
                aria-label="Clear local table sort and re-run this DEGRADATION request"
                title="Clear local table sort and re-run this DEGRADATION request"
              >
                <svg class="report-action-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 5h18l-7 8v5l-4 2v-7z"/></svg>
              </button>
              <p class="report-last-modified">Last modified: ${escapeHtml(formatDateTime(report.fetchedAt))}</p>
            </div>
          </footer>
        `;
      }

      function renderTable(report = null) {
        const columns = Array.isArray(report?.columns) ? report.columns : [];
        const rows = getSortedReportRows(report);
        if (columns.length === 0 || rows.length === 0) {
          return `<p class="report-empty">${escapeHtml(getNoRulesActiveMessage(report))}</p>`;
        }

        const reportIdAttr = escapeHtml(String(report?.reportId || ""));
        const activeSort = getReportSortState(report);
        const headerHtml = columns
          .map((column) => {
            const isActive = Boolean(activeSort && activeSort.column === column);
            const sortIcon = !isActive ? "" : activeSort.direction === "asc" ? "▲" : "▼";
            return `<th class="${isActive ? "active-sort" : ""}"><button type="button" class="sort-btn" data-action="sort-column" data-report-id="${reportIdAttr}" data-column="${escapeHtml(column)}"><span>${escapeHtml(column)}</span><span class="sort-icon">${escapeHtml(sortIcon)}</span></button></th>`;
          })
          .join("");
        const bodyHtml = rows
          .map((row) => {
            const cells = columns
              .map((column) => {
                const value = formatCellValue(row?.[column]);
                if (String(column || "").trim().toLowerCase() === "active") {
                  const isActive = String(value || "").trim().toUpperCase() === "YES";
                  const cls = isActive ? "pill-active" : "pill-active no";
                  const label = isActive ? "YES" : "NO";
                  return `<td><span class="${cls}">${label}</span></td>`;
                }
                return `<td>${escapeHtml(value || "N/A")}</td>`;
              })
              .join("");
            return `<tr>${cells}</tr>`;
          })
          .join("");

        return `
          <div class="table-wrap">
            <table class="report-table">
              <thead>
                <tr>${headerHtml}</tr>
              </thead>
              <tbody>${bodyHtml}</tbody>
            </table>
          </div>
        `;
      }

      function renderReportCard(report = null) {
        if (!report || typeof report !== "object") {
          return "";
        }
        const requestLine = firstNonEmptyString([
          report.requestUrl,
          `${report.endpointPath || ""}${report.programmerId ? `?programmer=${report.programmerId}` : ""}`,
        ]);
        const statusTitle = `GET: ${requestLine || "N/A"}`;
        if (report.ok && Number(report.rowCount || 0) === 0) {
          return `
            <article class="report-card report-card--no-active">
              <p class="report-no-active-line">
                <button
                  type="button"
                  class="report-no-active-copy"
                  data-action="copy-request-url"
                  data-report-id="${escapeHtml(String(report.reportId || ""))}"
                  title="${escapeHtml(statusTitle)}"
                  aria-label="Copy DEGRADATION request URL to clipboard"
                >${renderNoRulesCompactHtml(report)}</button>
              </p>
            </article>
          `;
        }

        const activeRules = Number(report.activeCount || report.rowCount || 0);
        const activeRuleLabel = `${activeRules} active rule${activeRules === 1 ? "" : "s"}`;
        const programmerScopeHtml = renderScopeEmphasisHtml(report);
        const httpLabel = report.status > 0 ? `HTTP ${report.status} ${report.statusText || ""}`.trim() : "Request Error";
        const errorMarkup = report.ok
          ? ""
          : `<p class="report-error">${escapeHtml(report.error || "Request failed.")}</p>`;
        const footerMarkup = renderReportFooter(report);

        return `
          <article class="report-card" data-report-id="${escapeHtml(String(report.reportId || ""))}">
            <header class="report-head">
              <div class="report-title-row">
                <p class="report-title">${escapeHtml(report.endpointTitle || "DEGRADATION Status")}</p>
                <button
                  type="button"
                  class="report-http-link ${report.ok ? "" : "error"}"
                  data-action="copy-request-url"
                  data-report-id="${escapeHtml(String(report.reportId || ""))}"
                  title="${escapeHtml(statusTitle)}"
                  aria-label="Copy DEGRADATION request URL to clipboard"
                >${escapeHtml(httpLabel)}</button>
              </div>
              <p class="report-subtitle">${programmerScopeHtml}</p>
              <p class="report-meta">${escapeHtml(report.ok ? activeRuleLabel : "Request failed")}</p>
            </header>
            ${errorMarkup}
            ${report.ok ? renderTable(report) : ""}
            ${footerMarkup}
          </article>
        `;
      }

      function renderReports() {
        if (!els.resultsHost) {
          return;
        }
        if (!Array.isArray(state.reports) || state.reports.length === 0) {
          els.resultsHost.innerHTML = "";
          refreshRerunAllButtonUi();
          return;
        }
        els.resultsHost.innerHTML = state.reports.map((report) => renderReportCard(report)).join("");
        refreshRerunAllButtonUi();
      }

      function upsertReport(report = null) {
        if (!report || typeof report !== "object") {
          return;
        }
        const identity = firstNonEmptyString([report.queryKey, report.reportId]);
        const nextReports = [report];
        state.reports.forEach((existing) => {
          const existingIdentity = firstNonEmptyString([existing?.queryKey, existing?.reportId]);
          if (!identity || existingIdentity !== identity) {
            nextReports.push(existing);
          }
        });
        state.reports = nextReports
          .sort((left, right) => Number(right?.fetchedAt || 0) - Number(left?.fetchedAt || 0))
          .slice(0, 30);
        const activeSortKeys = new Set(state.reports.map((entry) => getReportSortKey(entry)).filter(Boolean));
        Array.from(state.reportSortByQueryKey.keys()).forEach((sortKey) => {
          if (!activeSortKeys.has(sortKey)) {
            state.reportSortByQueryKey.delete(sortKey);
          }
        });
        renderReports();
      }

      async function runSelectedMethod(event) {
        if (event) {
          event.preventDefault();
        }
        if (state.busy) {
          return;
        }

        const endpointKey = String(els.methodPicker?.value || "all").trim().toLowerCase();
        const endpointSpec = getEndpointSpec(endpointKey);
        if (!endpointSpec) {
          setStatus("Choose a valid DEGRADATION method.", "error");
          return;
        }

        const queryValues = collectQueryValues(endpointSpec.key);
        if (!queryValues.requestorId) {
          setStatus("Select RequestorId first", "error");
          return;
        }

        setBusy(true);
        setStatus("Running DEGRADATION request...", "info");

        try {
          const report = await executeStatusRequest(endpointSpec, queryValues);
          upsertReport(report);

          if (report.ok) {
            setStatus("", "info");
          } else {
            setStatus(`${report.endpointTitle}: ${report.error || "Request failed."}`, "error");
          }
        } catch (error) {
          setStatus(error instanceof Error ? error.message : String(error), "error");
        } finally {
          setBusy(false);
        }
      }

      function bindEvents() {
        els.themeToggle?.addEventListener("click", () => {
          const nextTheme = getActiveTheme() === "dark" ? "light" : "dark";
          applyTheme(nextTheme, { persist: true });
        });

        els.methodPicker?.addEventListener("change", () => {
          syncSelectWidth(els.methodPicker);
        });

        els.requestorPicker?.addEventListener("change", () => {
          void onRequestorChange();
        });

        els.mvpdPicker?.addEventListener("change", () => {
          syncSelectWidth(els.mvpdPicker);
        });

        els.runnerForm?.addEventListener("submit", (event) => {
          void runSelectedMethod(event);
        });

        els.rerunAllButton?.addEventListener("click", () => {
          void rerunAllReports();
        });

        els.resultsHost?.addEventListener("click", (event) => {
          if (!(event.target instanceof Element)) {
            return;
          }

          const sortTrigger = event.target.closest('button[data-action="sort-column"]');
          if (sortTrigger instanceof HTMLButtonElement) {
            event.preventDefault();
            toggleReportSort(
              String(sortTrigger.getAttribute("data-report-id") || "").trim(),
              String(sortTrigger.getAttribute("data-column") || "").trim()
            );
            return;
          }

          const csvTrigger = event.target.closest('a[data-action="download-csv"]');
          if (csvTrigger instanceof HTMLAnchorElement) {
            event.preventDefault();
            downloadReportCsv(String(csvTrigger.getAttribute("data-report-id") || "").trim());
            return;
          }

          const copyUrlTrigger = event.target.closest('button[data-action="copy-request-url"]');
          if (copyUrlTrigger instanceof HTMLButtonElement) {
            event.preventDefault();
            void copyReportRequestUrl(String(copyUrlTrigger.getAttribute("data-report-id") || "").trim());
            return;
          }

          const rerunTrigger = event.target.closest('button[data-action="rerun-report"]');
          if (rerunTrigger instanceof HTMLButtonElement) {
            event.preventDefault();
            void rerunReportById(
              String(rerunTrigger.getAttribute("data-report-id") || "").trim(),
              { clearSort: true }
            );
          }
        });
      }

      async function initialize() {
        initTheme();
        syncEnvironmentBadge();
        bootstrapEmbeddedAccessToken();
        bindEvents();
        setStatus("", "info");
        syncHeaderControlWidths();
        await loadRequestorPicker();
        refreshRerunAllButtonUi();
      }

      initialize().catch((error) => {
        setStatus(error instanceof Error ? error.message : String(error), "error");
      });
    </script>
  </body>
</html>
