<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Opening UnderPAR ESM</title>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7f4eb;
        color: #2f2617;
      }

      main {
        width: min(560px, calc(100vw - 32px));
        padding: 28px 24px;
        border: 1px solid rgba(91, 72, 35, 0.18);
        border-radius: 18px;
        background: rgba(255, 252, 245, 0.96);
        box-shadow: 0 20px 48px rgba(64, 49, 21, 0.12);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 20px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        line-height: 1.5;
      }

      a {
        color: #9b401c;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Opening UnderPAR ESM</h1>
      <p id="status">Preparing your ESM deeplink...</p>
      <p id="manual-wrap" hidden>
        <a id="manual-link" href="#">Open UnderPAR manually</a>
      </p>
    </main>
    <script src="esm-deeplink-bridge.js"></script>
  </body>
</html>
