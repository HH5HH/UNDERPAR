<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UP Settings</title>
    <link rel="stylesheet" href="up-devtools-panel.css" />
  </head>
  <body>
    <main class="settings-shell">
      <section class="settings-card">
        <label class="field-label" for="environment-select">Environment</label>
        <div class="control-row">
          <select id="environment-select" class="env-select" aria-label="AdobePASS environment">
            <option value="">Loading environments...</option>
          </select>
          <button id="switch-btn" class="switch-btn" type="button">SWITCH</button>
        </div>
      </section>

      <section class="context-card">
        <h2>Current Environment URLs</h2>
        <dl class="context-list">
          <div class="context-row">
            <dt>AdobePASS Console</dt>
            <dd id="shell-url"></dd>
          </div>
          <div class="context-row">
            <dt>AdobePASS Console Base</dt>
            <dd id="console-base"></dd>
          </div>
          <div class="context-row">
            <dt>Concurrency Monitoring</dt>
            <dd id="cm-console-url"></dd>
          </div>
          <div class="context-row">
            <dt>Management</dt>
            <dd id="mgmt-base"></dd>
          </div>
          <div class="context-row">
            <dt>Service Provider</dt>
            <dd id="sp-base"></dd>
          </div>
          <div class="context-row">
            <dt>DCR Register</dt>
            <dd id="dcr-register-url"></dd>
          </div>
          <div class="context-row">
            <dt>DCR Token</dt>
            <dd id="dcr-token-url"></dd>
          </div>
          <div class="context-row">
            <dt>REST V2</dt>
            <dd id="rest-v2-base"></dd>
          </div>
          <div class="context-row">
            <dt>ESM</dt>
            <dd id="esm-base"></dd>
          </div>
          <div class="context-row">
            <dt>DEGRADATION</dt>
            <dd id="degradation-base"></dd>
          </div>
        </dl>
      </section>
    </main>

    <script src="underpar-environment.js"></script>
    <script src="up-devtools-panel.js"></script>
  </body>
</html>
