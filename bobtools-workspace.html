<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UP BOBTOOLS Workspace</title>
    <link id="workspace-style-link" rel="stylesheet" href="bobtools-workspace.css" />
  </head>
  <body>
    <main id="workspace-app-root" class="workspace-app">
      <header class="workspace-header">
        <div class="workspace-title-wrap">
          <p id="workspace-controller-state" class="workspace-controller-state">Waiting for UnderPAR side panel controller...</p>
          <p id="workspace-filter-state" class="workspace-filter-state"></p>
        </div>
        <div class="workspace-actions">
          <button id="workspace-refresh" class="workspace-icon-btn workspace-icon-btn--accent" type="button" title="Refresh selected MVPD context" aria-label="Refresh selected MVPD context">↻</button>
          <button id="workspace-clear" class="workspace-icon-btn" type="button" title="Clear selected result" aria-label="Clear selected result">✕</button>
        </div>
      </header>

      <p id="workspace-status" class="workspace-status" aria-live="polite"></p>

      <section class="bobtools-hero">
        <div class="bobtools-hero-art">
          <img id="bobtools-hero-icon" src="icons/medium.png" alt="BOBTOOLS" loading="lazy" decoding="async" />
        </div>
        <div class="bobtools-hero-copy">
          <p id="bobtools-greeting" class="bobtools-greeting"></p>
          <p id="bobtools-subtitle" class="bobtools-subtitle"></p>
        </div>
      </section>

      <section class="bobtools-grid">
        <article class="bobtools-card bobtools-card--profiles is-collapsed">
          <button type="button" class="bobtools-card-head bobtools-card-toggle" data-card-toggle="profiles" aria-expanded="false">
            <span class="bobtools-card-head-label">
              <h2>MVPD Login Profiles</h2>
              <span id="bobtools-profile-count" class="bobtools-count">0</span>
            </span>
            <span class="bobtools-card-chevron" aria-hidden="true">▼</span>
          </button>
          <div class="bobtools-card-body" data-card-body="profiles" hidden>
            <ul id="bobtools-profile-list" class="bobtools-profile-list"></ul>
          </div>
        </article>

        <article class="bobtools-card bobtools-card--watch is-collapsed">
          <button type="button" class="bobtools-card-head bobtools-card-toggle" data-card-toggle="watch" aria-expanded="false">
            <span class="bobtools-card-head-label">
              <h2>Can I watch?</h2>
            </span>
            <span class="bobtools-card-chevron" aria-hidden="true">▼</span>
          </button>
          <div class="bobtools-card-body" data-card-body="watch" hidden>
            <div class="bobtools-profile-context-row">
              <p id="bobtools-profile-context" class="bobtools-profile-context"></p>
              <div class="bobtools-profile-context-actions">
                <button
                  id="bobtools-copy-upstream"
                  class="bobtools-copy-upstream-btn"
                  type="button"
                  aria-label="Copy upstreamUserID to clipboard"
                  title="Copy upstreamUserID to clipboard"
                  hidden
                >
                  <span class="bobtools-copy-upstream-icon" aria-hidden="true"></span>
                </button>
                <button
                  id="bobtools-copy-result"
                  class="bobtools-copy-result-btn"
                  type="button"
                  aria-label="Copy formatted Can I watch? result"
                  title="Copy formatted Can I watch? result"
                  hidden
                >
                  <svg class="bobtools-copy-result-icon" viewBox="0 0 12 12" aria-hidden="true" focusable="false">
                    <rect x="1.5" y="1.5" width="9" height="9" rx="1.5"></rect>
                    <path d="M3.3 4.1h5.4M3.3 6.1h5.4M3.3 8.1h3.6"></path>
                  </svg>
                </button>
              </div>
            </div>
            <article id="bobtools-resource-picker-card" class="bobtools-resource-picker-card is-collapsed" hidden>
              <div
                id="bobtools-resource-picker-head"
                class="bobtools-resource-picker-head"
                role="button"
                tabindex="0"
                aria-expanded="false"
                aria-controls="bobtools-resource-picker-body"
              >
                <div class="bobtools-resource-picker-head-copy">
                  <p class="bobtools-resource-picker-title">Resource IDs</p>
                  <p id="bobtools-resource-picker-subtitle" class="bobtools-resource-picker-subtitle"></p>
                </div>
                <button
                  id="bobtools-resource-picker-toggle"
                  class="bobtools-resource-picker-toggle"
                  type="button"
                  aria-label="Expand resourceId list"
                  title="Expand resourceId list"
                >
                  <span class="bobtools-resource-picker-toggle-icon" aria-hidden="true">▾</span>
                </button>
              </div>
              <div id="bobtools-resource-picker-body" class="bobtools-resource-picker-body" hidden></div>
            </article>
            <form id="bobtools-form" class="bobtools-form">
              <input
                id="bobtools-resource-input"
                class="bobtools-resource-input"
                type="text"
                placeholder="RESOURCE_ID_1, RESOURCE_ID_2"
                aria-label="Resource IDs"
              />
              <button
                id="bobtools-go"
                class="bobtools-go"
                type="submit"
                aria-label="Run Can I watch? (Preauthorize)"
                title="Run Can I watch? (Preauthorize)"
              >
                <svg class="bobtools-go-icon" viewBox="0 0 40 32" aria-hidden="true" focusable="false">
                  <rect class="bobtools-go-shell" x="1.5" y="1.5" width="37" height="29" rx="6.2" />
                  <path class="bobtools-go-base" d="M1.5 22.1h37v2.2c0 3.5-2.8 6.2-6.2 6.2H7.7c-3.4 0-6.2-2.7-6.2-6.2v-2.2Z" />
                  <rect class="bobtools-go-face" x="3.2" y="3.2" width="33.6" height="20.6" rx="4.4" />
                  <path class="bobtools-go-gloss" d="M7.4 23.8V26c0 1.8.7 3.3 1.9 4.5H7.7c-3.4 0-6.2-2.7-6.2-6.2v-2.2h5.9c-.1.5 0 1.1 0 1.7Z" />
                  <circle class="bobtools-go-badge" cx="20" cy="12.8" r="6.9" />
                  <path class="bobtools-go-z" d="M14.4 9.4h10.1v2.3l-5.6 4.4h5.7V18H13.9v-2.2l5.8-4.5h-5.3V9.4Z" />
                  <circle class="bobtools-go-led" cx="26.6" cy="26.6" r="1.05" />
                  <circle class="bobtools-go-led" cx="30.4" cy="26.6" r="1.05" />
                </svg>
              </button>
            </form>
            <p id="bobtools-action-hint" class="bobtools-action-hint"></p>
            <p id="bobtools-result-status" class="bobtools-result-status"></p>
            <div id="bobtools-result-summary" class="bobtools-result-summary" hidden></div>
          </div>
        </article>

        <article id="bobtools-splunk-card" class="bobtools-card bobtools-card--splunk is-collapsed">
          <button type="button" class="bobtools-card-head bobtools-card-toggle" data-card-toggle="splunk" aria-expanded="false">
            <span class="bobtools-card-head-label">
              <h2>Splunk RCA</h2>
              <span id="bobtools-splunk-card-meta" class="bobtools-count" hidden></span>
            </span>
            <span class="bobtools-card-chevron" aria-hidden="true">▼</span>
          </button>
          <div id="bobtools-splunk-body" class="bobtools-card-body bobtools-splunk-card-body" data-card-body="splunk" hidden>
            <div class="bobtools-splunk-toolbar">
              <button id="bobtools-splunk" class="bobtools-splunk-go bobtools-splunk-run" type="button">SPLUNK</button>
            </div>
            <p id="bobtools-splunk-status" class="bobtools-splunk-status"></p>
            <div id="bobtools-splunk-summary" class="bobtools-splunk-summary"></div>
          </div>
        </article>
      </section>
    </main>

    <script src="underpar-environment.js"></script>
    <script src="bobtools-workspace.js"></script>
  </body>
</html>
