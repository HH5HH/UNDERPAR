<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UnderPAR</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="underpar-up-tab">
    <main class="app">
      <header class="header">
        <div class="brand">
          <h1>UnderPAR</h1>
          <p id="build-info" class="build-info">Version --</p>
        </div>
        <button
          id="auth-btn"
          type="button"
          class="auth-btn avatar"
          aria-label="UnderPAR activity"
          title="UnderPAR activity"
          hidden
        ></button>
      </header>

      <section id="zip-key-import-view" class="zip-key-import-view zip-key-import-view--gate">
        <div id="zip-key-import-card" class="zip-key-import-card">
          <div
            id="zip-key-dropzone"
            class="zip-key-dropzone"
            role="button"
            tabindex="0"
            aria-describedby="zip-key-import-state"
            aria-label="Drop ZIP.KEY here or choose a file"
          >
            <div class="zip-key-dropSurfaceCopy">
              <p id="zip-key-import-title" class="zip-key-import-title">LOAD KEY</p>
            </div>
            <button id="zip-key-browse-btn" type="button" class="zip-key-import-btn">CHOOSE KEY</button>
          </div>
          <p id="zip-key-import-description" class="zip-key-import-description" hidden></p>
          <p id="zip-key-import-client" class="zip-key-import-client" hidden></p>
          <p id="zip-key-import-state" class="zip-key-import-state" hidden></p>
          <input
            id="zip-key-file-input"
            type="file"
            accept=".key,.txt,.json,text/plain,application/json"
            hidden
          />
        </div>
      </section>

      <section id="sign-in-view" class="sign-in-view" hidden>
        <div class="sign-in-org-card">
          <button id="sign-in-hero-btn" type="button" class="sign-in-hero-btn">SIGN IN</button>
        </div>
      </section>

      <section id="avatar-menu" class="avatar-menu" hidden>
        <div class="avatar-menu-header">
          <div id="avatar-menu-image" class="avatar-menu-image" aria-hidden="true"></div>
          <div class="avatar-menu-identity">
            <a
              id="avatar-menu-name"
              class="avatar-menu-name avatar-menu-name-link"
              href="https://experience.adobe.com"
              target="_blank"
              rel="noreferrer"
            ></a>
            <p id="avatar-menu-email" class="avatar-menu-email"></p>
            <p id="avatar-menu-org" class="avatar-menu-org"></p>
          </div>
        </div>
        <div id="avatar-menu-details" class="avatar-menu-details"></div>
        <div id="avatar-menu-system" class="avatar-menu-system"></div>
        <hr class="avatar-menu-divider" />
        <div class="avatar-menu-actions">
          <button id="get-latest-btn" type="button" class="avatar-menu-action-btn avatar-menu-action-btn--latest" hidden>
            Get Latest
          </button>
          <button id="sign-out-btn" type="button" class="avatar-menu-action-btn sign-out-btn">Sign Out</button>
        </div>
      </section>

      <p id="status" class="status" aria-live="polite" hidden></p>

      <section id="restricted-view" class="restricted-view" hidden>
        <div class="restricted-view-card">
          <div class="field restricted-org-field">
            <label for="restricted-org-select">Adobe Org</label>
            <select id="restricted-org-select" disabled>
              <option value="">-- No organizations available --</option>
            </select>
          </div>
        </div>
      </section>

      <section id="workflow" class="workflow" hidden>
        <div class="field">
          <label for="media-company-select">Select a Media Company</label>
          <select id="media-company-select" disabled>
            <option value="">-- Please login first --</option>
          </select>
        </div>

        <div class="field">
          <label for="requestor-select">Content Provider (RequestorId)</label>
          <select id="requestor-select" disabled>
            <option value=""></option>
          </select>
        </div>

        <div class="field">
          <label for="mvpd-select">MVPD</label>
          <select id="mvpd-select" disabled>
            <option value=""></option>
          </select>
        </div>

        <div id="hr-services-container" class="hr-services-container" hidden></div>

        <div id="premium-services-container" class="premium-services-container">
          <p class="metadata-empty">No premium scoped applications loaded yet.</p>
        </div>
      </section>
    </main>

    <div class="page-env-badge-row" hidden>
      <span
        id="page-env-badge"
        class="page-env-badge"
        aria-label="Environment"
        title="Environment"
      >
        <span class="page-env-badge-prefix">ENV</span>
        <span class="page-env-badge-sep">|</span>
        <span id="page-env-badge-value" class="page-env-badge-value"></span>
      </span>
    </div>

    <dialog id="learning-inspector-dialog" class="hr-learning-inspector-dialog">
      <div class="hr-learning-inspector-dialog-shell">
        <header class="hr-learning-inspector-dialog-head">
          <div class="hr-learning-inspector-dialog-copy">
            <p id="learning-inspector-dialog-title" class="hr-learning-inspector-dialog-title">Inspector</p>
            <p id="learning-inspector-dialog-subtitle" class="hr-learning-inspector-dialog-subtitle"></p>
          </div>
          <button
            id="learning-inspector-dialog-close"
            class="hr-learning-inspector-dialog-close"
            type="button"
            title="Close inspector"
            aria-label="Close inspector"
          >
            <span aria-hidden="true">×</span>
          </button>
        </header>
        <section id="learning-inspector-dialog-body" class="hr-learning-inspector-dialog-body"></section>
      </div>
    </dialog>

    <script src="underpar-environment.js"></script>
    <script src="underpar-vault-store.js"></script>
    <script src="blondie-time-logic.js"></script>
    <script src="build-info-bootstrap.js"></script>
    <script src="underpar-jwt-inspector.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
