<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UnderPAR</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <section id="avatar-menu" class="avatar-menu" hidden>
        <div class="avatar-menu-header">
          <div id="avatar-menu-image" class="avatar-menu-image" aria-hidden="true"></div>
          <div class="avatar-menu-identity">
            <p id="avatar-menu-name" class="avatar-menu-name"></p>
            <p id="avatar-menu-email" class="avatar-menu-email"></p>
            <p id="avatar-menu-org" class="avatar-menu-org"></p>
          </div>
        </div>
        <div id="avatar-menu-details" class="avatar-menu-details"></div>
        <div id="avatar-menu-system" class="avatar-menu-system"></div>
        <hr class="avatar-menu-divider" />
        <div class="avatar-menu-actions">
          <button id="get-latest-btn" type="button" class="avatar-menu-action-btn avatar-menu-action-btn--latest" hidden>
            Get Latest
          </button>
          <button id="sign-out-btn" type="button" class="avatar-menu-action-btn sign-out-btn">Sign Out</button>
        </div>
      </section>

      <section class="app-shell-card">
        <header class="header">
          <div class="brand">
            <h1>UnderPAR</h1>
            <p id="build-info" class="build-info">Version --</p>
          </div>
          <button id="auth-btn" type="button" class="auth-btn">Sign In</button>
        </header>

        <p id="status" class="status" aria-live="polite" hidden></p>

        <section id="restricted-view" class="restricted-view" hidden>
          <p>For @AdobePass only</p>
        </section>

        <section id="workflow" class="workflow" hidden>
          <div class="field field--media-company">
            <label for="media-company-select">Select a Media Company</label>
            <div class="picker-action-row media-company-select-row">
              <select id="media-company-select" disabled>
                <option value="">-- Please login first --</option>
              </select>
              <button
                id="media-company-console-launch-btn"
                type="button"
                class="selector-quick-launch-btn media-company-console-btn is-hidden"
                aria-label="Open Media Company Registered Applications"
                title="Open Media Company Registered Applications"
                aria-hidden="true"
                disabled
              >
                <svg class="selector-quick-launch-icon media-company-console-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path
                    d="M12 3.25a1 1 0 0 1 .98.79l.32 1.5a6.92 6.92 0 0 1 1.45.61l1.29-.83a1 1 0 0 1 1.25.14l1.79 1.79a1 1 0 0 1 .14 1.25l-.83 1.29c.25.47.45.96.61 1.45l1.5.32a1 1 0 0 1 .79.98v2.52a1 1 0 0 1-.79.98l-1.5.32a6.92 6.92 0 0 1-.61 1.45l.83 1.29a1 1 0 0 1-.14 1.25l-1.79 1.79a1 1 0 0 1-1.25.14l-1.29-.83a6.92 6.92 0 0 1-1.45.61l-.32 1.5a1 1 0 0 1-.98.79H9.48a1 1 0 0 1-.98-.79l-.32-1.5a6.92 6.92 0 0 1-1.45-.61l-1.29.83a1 1 0 0 1-1.25-.14L2.4 18.67a1 1 0 0 1-.14-1.25l.83-1.29a6.92 6.92 0 0 1-.61-1.45l-1.5-.32a1 1 0 0 1-.79-.98V10.86a1 1 0 0 1 .79-.98l1.5-.32c.16-.5.36-.98.61-1.45l-.83-1.29A1 1 0 0 1 2.4 5.57l1.79-1.79a1 1 0 0 1 1.25-.14l1.29.83c.47-.25.96-.45 1.45-.61l.32-1.5a1 1 0 0 1 .98-.79Zm0 5.25a4.25 4.25 0 1 0 0 8.5 4.25 4.25 0 0 0 0-8.5Z"
                  />
                </svg>
              </button>
            </div>
          </div>

          <div class="field">
            <label for="requestor-select">Content Provider (RequestorId)</label>
            <select id="requestor-select" disabled>
              <option value="">-- Select a Media Company first --</option>
            </select>
          </div>

          <div class="field field--mvpd">
            <label for="mvpd-select">MVPD</label>
            <div class="picker-action-row mvpd-select-row">
              <select id="mvpd-select" disabled>
                <option value="">-- Select Requestor first --</option>
              </select>
              <button
                id="mvpd-workspace-launch-btn"
                type="button"
                class="selector-quick-launch-btn mvpd-global-workspace-btn is-hidden"
                aria-label="MVPD Workspace"
                title="MVPD Workspace"
                aria-hidden="true"
                disabled
              >
                <svg class="selector-quick-launch-icon mvpd-global-workspace-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path
                    d="M12 3.25a1 1 0 0 1 .98.79l.32 1.5a6.92 6.92 0 0 1 1.45.61l1.29-.83a1 1 0 0 1 1.25.14l1.79 1.79a1 1 0 0 1 .14 1.25l-.83 1.29c.25.47.45.96.61 1.45l1.5.32a1 1 0 0 1 .79.98v2.52a1 1 0 0 1-.79.98l-1.5.32a6.92 6.92 0 0 1-.61 1.45l.83 1.29a1 1 0 0 1-.14 1.25l-1.79 1.79a1 1 0 0 1-1.25.14l-1.29-.83a6.92 6.92 0 0 1-1.45.61l-.32 1.5a1 1 0 0 1-.98.79H9.48a1 1 0 0 1-.98-.79l-.32-1.5a6.92 6.92 0 0 1-1.45-.61l-1.29.83a1 1 0 0 1-1.25-.14L2.4 18.67a1 1 0 0 1-.14-1.25l.83-1.29a6.92 6.92 0 0 1-.61-1.45l-1.5-.32a1 1 0 0 1-.79-.98V10.86a1 1 0 0 1 .79-.98l1.5-.32c.16-.5.36-.98.61-1.45l-.83-1.29A1 1 0 0 1 2.4 5.57l1.79-1.79a1 1 0 0 1 1.25-.14l1.29.83c.47-.25.96-.45 1.45-.61l.32-1.5a1 1 0 0 1 .98-.79Zm0 5.25a4.25 4.25 0 1 0 0 8.5 4.25 4.25 0 0 0 0-8.5Z"
                  />
                </svg>
              </button>
            </div>
          </div>

          <div id="hr-services-container" class="hr-services-container">
            <p class="metadata-empty">Select a media company to load HR context.</p>
          </div>

          <div id="premium-services-container" class="premium-services-container">
            <p class="metadata-empty">No premium scoped applications loaded yet.</p>
          </div>
        </section>
      </section>
    </main>

    <div class="page-env-badge-row">
      <span
        id="page-env-badge"
        class="page-env-badge"
        aria-label="Environment"
        title="Environment"
      >
        <span class="page-env-badge-prefix">ENV</span>
        <span class="page-env-badge-sep">|</span>
        <span id="page-env-badge-value" class="page-env-badge-value"></span>
      </span>
    </div>

    <script src="underpar-environment.js"></script>
    <script src="blondie-time-logic.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
