<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UnderPAR</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="underpar-up-tab underpar-sidepanel">
    <main class="app">
      <section id="avatar-menu" class="avatar-menu" hidden>
        <div class="avatar-menu-header">
          <div id="avatar-menu-image" class="avatar-menu-image" aria-hidden="true"></div>
          <div class="avatar-menu-identity">
            <a
              id="avatar-menu-name"
              class="avatar-menu-name avatar-menu-name-link"
              href="https://experience.adobe.com"
              target="_blank"
              rel="noreferrer"
            ></a>
            <p id="avatar-menu-email" class="avatar-menu-email"></p>
            <p id="avatar-menu-org" class="avatar-menu-org"></p>
          </div>
        </div>
        <div id="avatar-menu-details" class="avatar-menu-details"></div>
        <div id="avatar-menu-system" class="avatar-menu-system"></div>
        <hr class="avatar-menu-divider" />
        <div class="avatar-menu-actions">
          <button id="get-latest-btn" type="button" class="avatar-menu-action-btn avatar-menu-action-btn--latest" hidden>
            Get Latest
          </button>
          <button id="sign-out-btn" type="button" class="avatar-menu-action-btn sign-out-btn">Sign Out</button>
        </div>
      </section>

      <section class="app-shell-card">
        <header class="header">
          <div class="brand">
            <h1>UnderPAR</h1>
            <p id="build-info" class="build-info">Version --</p>
          </div>
          <button id="auth-btn" type="button" class="auth-btn" aria-label="UnderPAR activity" title="UnderPAR activity" hidden></button>
        </header>

        <p id="status" class="status" aria-live="polite" hidden></p>

        <section id="zip-key-import-view" class="zip-key-import-view zip-key-import-view--gate">
          <div id="zip-key-import-card" class="zip-key-import-card">
            <div
              id="zip-key-dropzone"
              class="zip-key-dropzone"
              role="button"
              tabindex="0"
              aria-describedby="zip-key-import-state"
              aria-label="Drop ZIP.KEY here or choose a file"
            >
              <div class="zip-key-dropSurfaceCopy">
                <p id="zip-key-import-title" class="zip-key-import-title">LOAD KEY</p>
              </div>
              <button id="zip-key-browse-btn" type="button" class="zip-key-import-btn">CHOOSE KEY</button>
            </div>
            <p id="zip-key-import-description" class="zip-key-import-description" hidden></p>
            <p id="zip-key-import-client" class="zip-key-import-client" hidden></p>
            <p id="zip-key-import-state" class="zip-key-import-state" hidden></p>
            <input
              id="zip-key-file-input"
              type="file"
              accept=".key,.txt,.json,text/plain,application/json"
              hidden
            />
          </div>
        </section>

        <section id="sign-in-view" class="sign-in-view" hidden>
          <div class="sign-in-org-card">
            <button id="sign-in-hero-btn" type="button" class="sign-in-hero-btn">SIGN IN</button>
          </div>
        </section>

        <section id="restricted-view" class="restricted-view" hidden>
          <div class="restricted-view-card">
            <div class="field restricted-org-field">
              <label for="restricted-org-select">Adobe Org</label>
              <select id="restricted-org-select" disabled>
                <option value="">-- No organizations available --</option>
              </select>
            </div>
          </div>
        </section>

        <section id="workflow" class="workflow" hidden>
          <div class="field field--media-company">
            <label for="media-company-select">Select a Media Company</label>
            <div class="picker-action-row media-company-select-row">
              <select id="media-company-select" disabled>
                <option value="">-- Please login first --</option>
              </select>
              <button
                id="media-company-console-launch-btn"
                type="button"
                class="selector-quick-launch-btn media-company-console-btn is-hidden"
                aria-label="Open Media Company Registered Applications"
                title="Open Media Company Registered Applications"
                aria-hidden="true"
                disabled
              >
                <svg class="selector-quick-launch-icon media-company-console-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path
                    d="M12 3.25a1 1 0 0 1 .98.79l.32 1.5a6.92 6.92 0 0 1 1.45.61l1.29-.83a1 1 0 0 1 1.25.14l1.79 1.79a1 1 0 0 1 .14 1.25l-.83 1.29c.25.47.45.96.61 1.45l1.5.32a1 1 0 0 1 .79.98v2.52a1 1 0 0 1-.79.98l-1.5.32a6.92 6.92 0 0 1-.61 1.45l.83 1.29a1 1 0 0 1-.14 1.25l-1.79 1.79a1 1 0 0 1-1.25.14l-1.29-.83a6.92 6.92 0 0 1-1.45.61l-.32 1.5a1 1 0 0 1-.98.79H9.48a1 1 0 0 1-.98-.79l-.32-1.5a6.92 6.92 0 0 1-1.45-.61l-1.29.83a1 1 0 0 1-1.25-.14L2.4 18.67a1 1 0 0 1-.14-1.25l.83-1.29a6.92 6.92 0 0 1-.61-1.45l-1.5-.32a1 1 0 0 1-.79-.98V10.86a1 1 0 0 1 .79-.98l1.5-.32c.16-.5.36-.98.61-1.45l-.83-1.29A1 1 0 0 1 2.4 5.57l1.79-1.79a1 1 0 0 1 1.25-.14l1.29.83c.47-.25.96-.45 1.45-.61l.32-1.5a1 1 0 0 1 .98-.79Zm0 5.25a4.25 4.25 0 1 0 0 8.5 4.25 4.25 0 0 0 0-8.5Z"
                  />
                </svg>
              </button>
            </div>
          </div>

          <div class="field field--requestor">
            <label for="requestor-select">Content Provider (RequestorId)</label>
            <div class="picker-action-row requestor-select-row">
              <select id="requestor-select" disabled>
                <option value=""></option>
              </select>
              <span class="selector-quick-launch-spacer" aria-hidden="true"></span>
            </div>
          </div>

          <div class="field field--mvpd">
            <label for="mvpd-select">MVPD</label>
            <div class="picker-action-row mvpd-select-row">
              <select id="mvpd-select" disabled>
                <option value=""></option>
              </select>
              <button
                id="mvpd-workspace-launch-btn"
                type="button"
                class="selector-quick-launch-btn mvpd-global-workspace-btn is-hidden"
                aria-label="MVPD Workspace"
                title="MVPD Workspace"
                aria-hidden="true"
                disabled
              >
                <svg class="selector-quick-launch-icon mvpd-global-workspace-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path
                    d="M12 3.25a1 1 0 0 1 .98.79l.32 1.5a6.92 6.92 0 0 1 1.45.61l1.29-.83a1 1 0 0 1 1.25.14l1.79 1.79a1 1 0 0 1 .14 1.25l-.83 1.29c.25.47.45.96.61 1.45l1.5.32a1 1 0 0 1 .79.98v2.52a1 1 0 0 1-.79.98l-1.5.32a6.92 6.92 0 0 1-.61 1.45l.83 1.29a1 1 0 0 1-.14 1.25l-1.79 1.79a1 1 0 0 1-1.25.14l-1.29-.83a6.92 6.92 0 0 1-1.45.61l-.32 1.5a1 1 0 0 1-.98.79H9.48a1 1 0 0 1-.98-.79l-.32-1.5a6.92 6.92 0 0 1-1.45-.61l-1.29.83a1 1 0 0 1-1.25-.14L2.4 18.67a1 1 0 0 1-.14-1.25l.83-1.29a6.92 6.92 0 0 1-.61-1.45l-1.5-.32a1 1 0 0 1-.79-.98V10.86a1 1 0 0 1 .79-.98l1.5-.32c.16-.5.36-.98.61-1.45l-.83-1.29A1 1 0 0 1 2.4 5.57l1.79-1.79a1 1 0 0 1 1.25-.14l1.29.83c.47-.25.96-.45 1.45-.61l.32-1.5a1 1 0 0 1 .98-.79Zm0 5.25a4.25 4.25 0 1 0 0 8.5 4.25 4.25 0 0 0 0-8.5Z"
                  />
                </svg>
              </button>
            </div>
          </div>

          <div id="hr-services-container" class="hr-services-container" hidden></div>

          <div id="premium-services-container" class="premium-services-container">
            <p class="metadata-empty">No premium scoped applications loaded yet.</p>
          </div>
        </section>
      </section>

      <section id="debugConsole" class="surface surface--debug is-collapsed" aria-label="Debug info">
        <div class="debug-header">
          <button
            id="debugToggleButton"
            class="debug-toggle"
            type="button"
            aria-expanded="false"
            aria-controls="debugConsoleBody"
          >
            <span class="debug-toggleHeading">
              <span id="debugToggleButtonLabel" class="spectrum-Detail spectrum-Detail--sizeL debug-toggleTitle">DEBUG INFO</span>
              <span id="debugToggleButtonMeta" class="spectrum-Body spectrum-Body--sizeS debug-toggleSubtitle">Click copies. Shift+click toggles details.</span>
            </span>
            <span id="debugToggleStatus" class="spectrum-Detail spectrum-Detail--sizeS debug-toggleStatus" hidden>Copied to clipboard</span>
            <span id="debugToggleIcon" class="debug-toggleIcon" aria-hidden="true">▼</span>
          </button>
        </div>

        <div id="debugConsoleBody" class="debug-body" hidden>
          <div class="spectrum-Textfield spectrum-Textfield--sizeM spectrum-Textfield--multiline is-readOnly debug-field">
            <textarea id="logOutput" class="spectrum-Textfield-input debug-field-input" readonly spellcheck="false"></textarea>
          </div>
        </div>
      </section>
    </main>

    <div class="page-env-badge-row">
      <span
        id="page-env-badge"
        class="page-env-badge"
        aria-label="Environment"
        title="Environment"
      >
        <span class="page-env-badge-prefix">ENV</span>
        <span class="page-env-badge-sep">|</span>
        <span id="page-env-badge-value" class="page-env-badge-value"></span>
      </span>
    </div>

    <script src="underpar-environment.js"></script>
    <script src="underpar-vault-store.js"></script>
    <script src="blondie-time-logic.js"></script>
    <script src="build-info-bootstrap.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
